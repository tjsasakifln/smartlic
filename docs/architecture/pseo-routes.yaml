# =========================================================================
adr_seo_001:
  description: "Routes under these prefixes MUST NOT call notFound() on data gaps"
  protected_prefixes:
    - /observatorio
    - /cnpj
    - /fornecedores
    - /orgaos
    - /municipios
    - /licitacoes
    - /contratos
    - /alertas-publicos
    - /itens
    - /blog
    - /casos
    - /glossario
    - /guia
    - /masterclass
    - /perguntas
    - /compliance
  ci_gate: ".github/workflows/audit-seo-notfound.yml"
  adr_doc: "docs/adr/ADR-SEO-001-programmatic-routes-no-notfound-on-data-gap.md"

