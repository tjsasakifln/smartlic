[pytest]
testpaths = tests
timeout = 180
timeout_method = thread
markers =
    auth: autenticação e controle de acesso
    search: fluxo de busca e resultados
    seo: auditoria de SEO e conteúdo público
    admin: páginas de administração
    insight: auditoria de qualidade (soft assertions)
addopts = -v --timeout=180
