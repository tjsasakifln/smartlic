# =============================================================================
# BidIQ Uniformes - Frontend Railway Configuration
# =============================================================================
# Service: bidiq-frontend
# Framework: Next.js 16 + React 18
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["frontend/**"]

[deploy]
healthcheckPath = "/api/health"
# SLA-001: 600s timeout — image pull (131MB) + cold start takes >5min on Railway
# Previously 300s caused healthcheck to fail before container was ready on first deploy.
# restart policy would eventually recover, but deployment was marked "failed".
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
# SLA-001: 10 retries before giving up (was 3 — too aggressive for transient OOM)
restartPolicyMaxRetries = 10
# SLA-001: 30s overlap for zero-downtime deploys (was 15s — not enough for SSR warm-up)
overlapSeconds = 30
# GTM-INFRA-002 AC4: 120s drain aligned with Railway hard timeout
# Prevents killing in-flight proxy requests during deploys (was 15s)
drainingSeconds = 120

# =============================================================================
# Environment Variables (Set in Railway Dashboard)
# =============================================================================
# REQUIRED:
#   - BACKEND_URL (Runtime URL of backend service, e.g. https://bidiq-backend.up.railway.app)
#   - PORT (Auto-injected by Railway)
# =============================================================================
