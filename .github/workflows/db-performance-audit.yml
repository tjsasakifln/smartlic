# #1866 AC4: Weekly DB performance audit
#
# Runs analyze-slow-queries.py weekly and fails if any query has
# mean_time > 500ms. Also runs check-unused-indexes.py to detect
# candidate indexes for removal.
#
# Schedule: every Monday at 09:00 UTC
# Manual dispatch: workflow_dispatch
#
# Required secrets:
#   SUPABASE_URL              — Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY — Service role key (admin access)

name: "DB Performance Audit (#1866)"

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  issues: write

concurrency:
  group: db-performance-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slow-query-audit:
    name: Slow Query Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Run slow query analysis
        id: slowqueries
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/analyze-slow-queries.py \
            --limit 20 \
            --threshold-ms 100 \
            --fail-mean-ms 500 \
            --output /tmp/slow-queries-report.json
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          # Dump summary to logs
          python -c "
          import json
          with open('/tmp/slow-queries-report.json') as f:
              r = json.load(f)
          s = r.get('summary', {})
          print(f'Status: {s.get(\"status\", \"unknown\")}')
          print(f'Queries fetched: {s.get(\"queries_fetched\", 0)}')
          print(f'Total calls: {s.get(\"total_calls\", 0)}')
          print(f'Overall mean time: {s.get(\"overall_mean_time_ms\", \"N/A\")} ms')
          print(f'Max mean time: {s.get(\"max_mean_time_ms\", \"N/A\")} ms')
          print(f'Queries > 500ms: {s.get(\"queries_above_500ms\", 0)}')
          "

      - name: Run unused index check
        id: unusedidx
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true  # Unused indexes are advisory, not a blocker
        run: |
          python scripts/check-unused-indexes.py \
            --min-size-mb 1 \
            --output /tmp/unused-indexes-report.json
          echo "status=$?" >> "$GITHUB_OUTPUT"

      - name: Create issue if slow queries detected
        if: steps.slowqueries.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/slow-queries-report.json', 'utf8'));
            const s = report.summary || {};

            let body = `## DB Performance Audit — Slow Queries Detected

            **Date:** ${new Date().toISOString()}
            **Max mean_time:** ${s.max_mean_time_ms || 'N/A'} ms
            **Queries above 500ms:** ${s.queries_above_500ms || 0}

            ### Top Queries by Total Time

            | Rank | Calls | Mean (ms) | Query Preview |
            |------|-------|-----------|---------------|
            `;

            (report.top_by_total_time || []).slice(0, 10).forEach((q, i) => {
              const preview = (q.query_preview || '').slice(0, 80).replace(/\n/g, ' ');
              body += `| ${i + 1} | ${q.calls || 0} | ${(q.mean_time_ms || 0).toFixed(1)} | \`${preview}\` |\n`;
            });

            body += `\n### EXPLAIN Plans Generated\n`;
            body += `\`${report.slow_queries_explain ? report.slow_queries_explain.length : 0}\` EXPLAIN plans were generated for slow queries.\n`;
            body += `\n---\nGenerated by weekly DB performance audit workflow.\n`;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[PERF] Slow queries detected in weekly DB audit',
              body,
              labels: ['performance', 'database'],
            });

            console.log(`Created issue #${issue.number}`);

      - name: Fail on slow queries
        if: steps.slowqueries.outputs.status != '0'
        run: |
          echo "CRITICAL: Database queries with mean_time > 500ms detected."
          echo "Check the generated issue or run analyze-slow-queries.py locally."
          exit 1
