# CRIT-038 AC2: Frontend test gate — zero failures required for merge
# DEBT-007: Added vulnerability scanning
# THIS IS THE AUTHORITATIVE FRONTEND PR GATE. Do not disable this workflow.
name: "Frontend Tests (PR Gate)"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      # Content quality gate: ensures all static content (questions, glossary,
      # programmatic SEO, etc.) has proper Portuguese accents. Blocks merge if
      # any unaccented token is found inside string literals of frontend/lib/*.ts.
      # See docs/content-authoring-guide.md for fixing instructions.
      - name: Content accents check
        run: |
          python3 -V
          python3 scripts/check_content_accents.py

      # CI-002: Advisory security audit — runs early so results are visible even if tests fail.
      # The blocking critical-level audit (DEBT-123 AC2) runs after tests.
      - name: Security audit (advisory — high level)
        run: npm audit --audit-level=high 2>&1 || true
        working-directory: frontend
        continue-on-error: true  # CI-002: intentional — advisory only, blocking critical scan follows

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit --pretty

      # SEO-PROG-008 AC5: gate against incomplete BACKEND_URL fallback chains.
      # Antipattern: `process.env.BACKEND_URL || 'http://localhost:8000'` (sem
      # NEXT_PUBLIC_BACKEND_URL fallback). All call sites must use the helper
      # `getBackendUrl()` from `frontend/lib/backend-url.ts` or include the full
      # 3-way chain. Memory ref: feedback_build_hammers_backend_cascade.
      - name: Lint BACKEND_URL fallback chain (SEO-PROG-008)
        run: |
          cd frontend
          # Check only files changed by this PR to avoid blocking on pre-existing
          # debt in main. Full sweep is tracked under SEO-PROG-008 remaining work.
          changed_files=$(git diff origin/main...HEAD --name-only --diff-filter=ACM \
            | grep -E '\.(ts|tsx)$' \
            | grep -E '^frontend/(app|lib)/' \
            | sed 's|^frontend/||' \
            | grep -v '^lib/backend-url\.ts$' || true)
          if [ -z "$changed_files" ]; then
            echo "✅ No TS/TSX files changed — BACKEND_URL chain audit skipped"
            exit 0
          fi
          # Find changed files with incomplete chain (missing NEXT_PUBLIC_BACKEND_URL).
          violations=$(echo "$changed_files" \
            | xargs -I{} grep -lE "process\.env\.BACKEND_URL\s*\|\|\s*'http://localhost" {} 2>/dev/null \
            | xargs -I{} grep -L "NEXT_PUBLIC_BACKEND_URL" {} 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "ERROR: incomplete BACKEND_URL fallback chain detected in changed files. Use getBackendUrl() from lib/backend-url.ts:"
            echo "$violations"
            exit 1
          fi
          echo "✅ BACKEND_URL chain audit clean"

      - name: Run tests (exit code 0 required)
        run: |
          cd frontend
          npm test -- --coverage --ci --no-cache
          echo "✅ All frontend tests passed with coverage thresholds met"

      # DEBT-123 AC2: Vulnerability scanning — BLOCKING for critical
      - name: Vulnerability scan (npm audit — CRITICAL, blocking)
        run: |
          cd frontend
          npm audit --audit-level=critical
          echo "✅ npm audit: no critical vulnerabilities"

      # DEBT-123 AC9: HIGH vulnerabilities — intentionally non-blocking (dev deps may have known HiGH advisories)
      - name: Vulnerability scan (npm audit — HIGH, advisory)
        run: |
          cd frontend
          npm audit --audit-level=high || echo "⚠️ HIGH vulnerabilities found — review recommended"
        continue-on-error: true  # DEBT-123 AC9: intentional — HIGH vulns in dev deps are advisory

      # DEBT-108 AC10/AC11: Bundle size budget — 250 KB gzipped first load JS
      - name: Build for bundle analysis
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
          SENTRY_AUTH_TOKEN: ''

      - name: Check bundle size budget (AC10/AC11)
        run: npx size-limit
        working-directory: frontend
