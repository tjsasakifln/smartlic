# DEBT-08 AC3/AC5: Chromatic visual regression — 10 critical screens.
# Uses @chromatic-com/playwright integration (no Storybook required).
# Captures visual snapshots via Playwright and sends to Chromatic for diffing.
# AC5: Visual diff review is available in PRs via Chromatic's GitHub integration.
name: "Chromatic Visual Regression"

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/chromatic.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/chromatic.yml'

permissions:
  contents: read

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  chromatic:
    name: "Chromatic — Visual Regression (10 screens)"
    runs-on: ubuntu-latest
    # NOTE: job-level `if: ${{ secrets.* }}` is not evaluated by GitHub Actions
    # (secrets are not exposed to if-conditions). Check is performed inside
    # the first step below and subsequent steps gate on its output.

    steps:
      - name: Check Chromatic token
        id: token_check
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -z "${CHROMATIC_PROJECT_TOKEN}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CHROMATIC_PROJECT_TOKEN not set — skipping visual regression."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.token_check.outputs.has_token == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for Chromatic to detect baselines correctly

      - name: Set up Node.js 20
        if: steps.token_check.outputs.has_token == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.token_check.outputs.has_token == 'true'
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        if: steps.token_check.outputs.has_token == 'true'
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Build Next.js app
        if: steps.token_check.outputs.has_token == 'true'
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SENTRY_AUTH_TOKEN: ''

      - name: Run Chromatic visual tests
        if: steps.token_check.outputs.has_token == 'true'
        # DEBT-08 AC3/AC5: Run Playwright visual tests and send snapshots to Chromatic.
        # --auto-accept-changes on main branch (baselines are auto-accepted on main).
        # On PRs, Chromatic posts a review UI link to the PR for visual diff review (AC5).
        run: |
          cd frontend
          npx chromatic \
            --playwright \
            --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }} \
            --config=tests/chromatic/chromatic.config.ts \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--auto-accept-changes' || '' }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  chromatic-gate:
    name: "Chromatic Gate"
    runs-on: ubuntu-latest
    needs: [chromatic]
    steps:
      - name: Chromatic visual review available
        run: |
          echo "✅ DEBT-08 AC5: Chromatic visual diff is available in PR review."
          echo "   Check the Chromatic link in PR checks for visual changes."
