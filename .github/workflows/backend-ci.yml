# NOTE: This workflow (backend-ci.yml) is SUPERSEDED by backend-tests.yml (CRIT-038 PR gate).
# backend-tests.yml is the authoritative backend PR gate with quality tools (pip-audit, ruff,
# mypy, schema validation, per-module coverage). This file is kept for the Trivy CRITICAL scan
# and pip-audit HIGH advisory which backend-tests.yml does not duplicate.
# If you need to disable one, disable this file — NOT backend-tests.yml.
name: "Backend CI (Security + Linting)"

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - main
      - develop

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          cd backend
          ruff check .
        continue-on-error: true  # Aligned with backend-tests.yml — lint is advisory, not blocking

      - name: Security scan (CRITICAL — blocking)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

      # DEBT-123 AC9: HIGH-level pip-audit — intentionally non-blocking (CRITICAL already blocking via Trivy above)
      - name: Security scan (HIGH — warning only)
        run: |
          cd backend
          echo "⚠️ Running pip-audit for advisory-level vulnerabilities (non-blocking)..."
          pip install pip-audit --quiet
          pip-audit --desc on || echo "⚠️ Vulnerabilities found — review recommended"
        continue-on-error: true  # DEBT-123 AC9: intentional — CRITICAL already blocking via Trivy, HIGH is advisory

      - name: Run mypy type checking
        run: |
          cd backend
          mypy . --config-file pyproject.toml || echo "::warning::mypy found type errors — review required"

      # STORY-CONV-003c (Abstract Coral session): pytest execution + codecov upload removed.
      # This workflow is superseded by backend-tests.yml (see header note) for the PR-gate
      # test matrix + coverage upload. Running pytest here hit PNCP live endpoints via
      # integration tests with no timeout budget, producing spurious CI failures that did
      # NOT reflect backend-tests.yml (authoritative gate). Lint/type/security scans above
      # remain the responsibility of this workflow.
