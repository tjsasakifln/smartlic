name: "Health alert (OPS-MTTR-001)"

# Operationalises AC4 of issue #970: proactive alert when /health/ready returns
# 5xx for >5min consecutively. Pragmatic implementation — runs every 5min and
# emails on each failure (memory `reference_resend_personal_tone_send`: domain
# smartlic.tech verified, from tiago@smartlic.tech).
#
# Production rollout note: requires RESEND_API_KEY secret in repo settings.
# Without it, the email step is skipped (workflow still flags the failure in logs).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-alert
  cancel-in-progress: false

jobs:
  probe:
    name: Probe /health/ready
    runs-on: ubuntu-latest
    steps:
      - name: Hit health endpoint
        id: probe
        run: |
          set +e
          STATUS=$(curl -sS -o /tmp/health.txt -w "%{http_code}" --max-time 15 https://api.smartlic.tech/health/ready)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Status: $STATUS"
          cat /tmp/health.txt || true
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" = "000" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Send Resend email on failure
        if: steps.probe.outputs.failed == 'true' && env.RESEND_API_KEY != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STATUS: ${{ steps.probe.outputs.status }}
        run: |
          BODY=$(cat <<EOF
          {
            "from": "tiago@smartlic.tech",
            "to": ["tiago.sasaki@gmail.com"],
            "reply_to": "tiago.sasaki@gmail.com",
            "subject": "[SmartLic] /health/ready returned ${STATUS}",
            "text": "Health check failed at $(date -u +%FT%TZ).\nStatus: ${STATUS}\nEndpoint: https://api.smartlic.tech/health/ready\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nNext steps: railway logs --service bidiq-backend --tail 100"
          }
          EOF
          )
          curl -sS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY"

      - name: Fail the run if probe failed
        if: steps.probe.outputs.failed == 'true'
        run: |
          echo "::error::/health/ready returned ${{ steps.probe.outputs.status }}"
          exit 1
