# TD-GTM-004 (#193): Dependency security scanning via pip-audit + npm audit.
# #1883: Added pip-licenses license compliance check (GPL/AGPL block).
#
# Complementary to dep-scan.yml (DEBT-08, PyPI advisories): this workflow uses
# the OSV vulnerability service for broader/recent CVE coverage and runs on a
# daily schedule so newly disclosed CVEs in already-merged dependencies surface
# within 24h instead of waiting for the next dep-changing PR.
name: "Dependency Audit (OSV + License)"

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/dependency-audit.yml'
  schedule:
    # Daily at 07:00 UTC (04:00 BRT) — surfaces newly disclosed CVEs within 24h.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────────────
  # Backend: pip-audit against the OSV database
  # ─────────────────────────────────────────────────
  pip-audit:
    name: "Backend — pip-audit (OSV)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install 'pip-audit==2.9.0'

      - name: Run pip-audit (OSV, strict)
        # --strict: fail on any vulnerability (not just HIGH/CRITICAL); pairs with
        # documented --ignore-vuln entries in docs/security/dependency-scanning.md.
        # --vulnerability-service osv: free OSV.dev advisories with broad coverage.
        # PYSEC-2026-161: starlette<1.0.1 Host header — pre-existing, not fixable
        # without FastAPI major upgrade (starlette is a FastAPI dep). Tracked separately.
        run: |
          set -euo pipefail
          mkdir -p audit-reports
          pip-audit \
            -r backend/requirements.txt \
            --strict \
            --vulnerability-service osv \
            --ignore-vuln PYSEC-2026-161 \
            --desc on \
            --format json \
            --output audit-reports/pip-audit.json
          echo "pip-audit (OSV): clean (PYSEC-2026-161 ignored — tracked separately)"

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-osv-report
          path: audit-reports/pip-audit.json
          if-no-files-found: ignore
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Frontend: npm audit (production deps, HIGH+)
  # ─────────────────────────────────────────────────
  npm-audit:
    name: "Frontend — npm audit (prod, HIGH+)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Honors frontend/package.json engines (>=18). Pinned to 20 LTS to match
          # other workflows (dep-scan.yml, frontend-tests.yml).
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (no scripts)
        run: |
          cd frontend
          npm ci --ignore-scripts

      - name: Run npm audit (prod, HIGH+)
        run: |
          cd frontend
          mkdir -p ../audit-reports
          # Capture JSON for artifact, then re-run with human-readable output for
          # the action log. --omit=dev focuses the gate on prod runtime.
          npm audit --audit-level=high --omit=dev --json > ../audit-reports/npm-audit.json || NPM_AUDIT_EXIT=$?
          npm audit --audit-level=high --omit=dev
          if [ -n "${NPM_AUDIT_EXIT:-}" ] && [ "${NPM_AUDIT_EXIT}" -ne 0 ]; then
            echo "npm audit reported HIGH/CRITICAL vulnerabilities — see report artifact"
            exit "${NPM_AUDIT_EXIT}"
          fi
          echo "npm audit (prod): clean"

      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: audit-reports/npm-audit.json
          if-no-files-found: ignore
          retention-days: 30

  # ─────────────────────────────────────────────────
  # License compliance: pip-licenses — blocks GPL/AGPL
  # ─────────────────────────────────────────────────
  license-check:
    name: "Backend — pip-licenses (GPL/AGPL block)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-licenses
        run: pip install pip-licenses

      - name: Check licenses (fail on GPL/AGPL)
        # LGPD compliance: GPL/AGPL licenses are incompatible with commercial
        # distribution. pip-licenses outputs JSON, then a Python one-liner
        # filters for forbidden identifiers and exits 1 if found.
        run: |
          set -euo pipefail
          mkdir -p audit-reports
          pip-licenses \
            -r backend/requirements.txt \
            --format=json \
            --with-authors \
            --with-urls \
            --with-system \
            --output-file audit-reports/pip-licenses.json

          python3 -c "
import json, sys

with open('audit-reports/pip-licenses.json') as f:
    packages = json.load(f)

FORBIDDEN = {'GPL', 'GPL-2.0', 'GPL-2.0-only', 'GPL-2.0+', 'GPL-2.0-or-later',
             'GPL-3.0', 'GPL-3.0-only', 'GPL-3.0+', 'GPL-3.0-or-later',
             'AGPL', 'AGPL-3.0', 'AGPL-3.0-only', 'AGPL-3.0-or-later'}

blocked = [(p['Name'], p['License']) for p in packages
           if p['License'] in FORBIDDEN]

if blocked:
    print('BLOCKED — GPL/AGPL dependencies found:')
    for name, lic in blocked:
        print(f'  {name} ({lic})')
    sys.exit(1)

print(f'License check passed — {len(packages)} packages, no GPL/AGPL')
          "

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-licenses-report
          path: audit-reports/pip-licenses.json
          if-no-files-found: ignore
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Gate summary — all jobs must pass to unblock PRs
  # ─────────────────────────────────────────────────
  dependency-audit-gate:
    name: "Dependency Audit Gate"
    runs-on: ubuntu-latest
    needs: [pip-audit, npm-audit, license-check]
    if: always()
    steps:
      - name: Verify all audits passed
        run: |
          if [ "${{ needs.pip-audit.result }}" != "success" ] || [ "${{ needs.npm-audit.result }}" != "success" ] || [ "${{ needs.license-check.result }}" != "success" ]; then
            echo "Dependency audit failed — see job logs and artifacts"
            exit 1
          fi
          echo "Dependency audit gate: passed"
