name: "Deploy to Production (Railway)"

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      - 'railway.toml'
      - 'backend/railway.toml'
      - 'frontend/railway.toml'
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.service }}" in
              all)
                echo "backend=true" >> $GITHUB_OUTPUT
                echo "frontend=true" >> $GITHUB_OUTPUT
                ;;
              backend)
                echo "backend=true" >> $GITHUB_OUTPUT
                echo "frontend=false" >> $GITHUB_OUTPUT
                ;;
              frontend)
                echo "backend=false" >> $GITHUB_OUTPUT
                echo "frontend=true" >> $GITHUB_OUTPUT
                ;;
            esac
          else
            if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
              echo "backend=true" >> $GITHUB_OUTPUT
            else
              echo "backend=false" >> $GITHUB_OUTPUT
            fi
            if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
              echo "frontend=true" >> $GITHUB_OUTPUT
            else
              echo "frontend=false" >> $GITHUB_OUTPUT
            fi
          fi

  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend == 'true'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Inject APP_VERSION into Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway variables set APP_VERSION=${{ steps.version.outputs.version }} --service bidiq-backend

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Try redeploy first (faster, uses GitHub source)
          echo "Attempting redeploy..."
          if railway redeploy --service bidiq-backend -y; then
            echo "Redeploy triggered successfully"
            exit 0
          fi

          # Fallback to upload if redeploy fails
          echo "Redeploy failed, trying upload..."
          for i in 1 2 3; do
            echo "Upload attempt $i..."
            if timeout 180 railway up --service bidiq-backend --detach; then
              echo "Deploy successful"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All deploy attempts failed"
          exit 1

      - name: Wait for deployment
        run: sleep 45

      - name: Health check
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${BACKEND_URL}/health" > /dev/null 2>&1; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Backend health check failed after 5 attempts"
          exit 1

  apply-migrations:
    name: Apply Pending Migrations
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    outputs:
      status: ${{ steps.result.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for pending migrations
        id: check
        run: |
          echo "=== Checking migration status ==="
          OUTPUT=$(supabase migration list --linked 2>&1)
          echo "$OUTPUT"

          UNAPPLIED=$(echo "$OUTPUT" | awk -F'|' '
            NR > 2 {
              local = $1; gsub(/^[ \t]+|[ \t]+$/, "", local)
              remote = $2; gsub(/^[ \t]+|[ \t]+$/, "", remote)
              if (local != "" && remote == "") print local
            }
          ')

          if [ -n "$UNAPPLIED" ] || echo "$OUTPUT" | grep -q "Not applied"; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "Pending migrations found:"
            echo "$UNAPPLIED"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "All migrations already applied."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # DEBT-123 AC9: Migration push — intentionally non-blocking (marks deploy DEGRADED, not failed)
      # velvet-music fix: Supabase CLI db push treats `.down.sql` as migrations too,
      # which causes schema_migrations_pkey duplicate when both `.sql` + `.down.sql`
      # share a timestamp (STORY-6.2 paired convention). Move .down.sql files aside
      # before push, then restore (runner is ephemeral but keep git state clean).
      - name: Apply migrations (db push)
        id: push
        if: steps.check.outputs.has_pending == 'true'
        continue-on-error: true  # DEBT-123 AC9: intentional — migration failure = DEGRADED deploy, not rollback
        run: |
          echo "=== Applying pending migrations ==="
          mkdir -p /tmp/_down_migrations_stash
          find supabase/migrations -maxdepth 1 -name '*.down.sql' -exec mv {} /tmp/_down_migrations_stash/ \; || true
          supabase db push --include-all
          STATUS=$?
          # Restore (best-effort — runner is ephemeral but keep working tree coherent)
          find /tmp/_down_migrations_stash -maxdepth 1 -name '*.down.sql' -exec mv {} supabase/migrations/ \; || true
          rmdir /tmp/_down_migrations_stash 2>/dev/null || true
          if [ $STATUS -ne 0 ]; then
            echo "::error::supabase db push failed with status $STATUS"
            exit $STATUS
          fi
          echo "Migrations applied successfully."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # DEBT-123 AC9: PostgREST notify — intentionally non-blocking (schema auto-refreshes within ~60s)
      - name: Notify PostgREST schema reload
        if: steps.push.outcome == 'success' || steps.check.outputs.has_pending == 'false'
        continue-on-error: true  # DEBT-123 AC9: intentional — PostgREST auto-detects within ~60s if NOTIFY fails
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            psql "$SUPABASE_DB_URL" -c "NOTIFY pgrst, 'reload schema';" 2>&1
            echo "PostgREST schema reload notified via NOTIFY."
          else
            echo "::warning::SUPABASE_DB_URL not set — PostgREST will auto-detect schema changes within ~60s"
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Verify no PGRST205 errors (smoke test)
        if: steps.push.outcome == 'success' || steps.check.outputs.has_pending == 'false'
        run: |
          echo "Waiting 10s for PostgREST schema reload..."
          sleep 10

          echo "=== PGRST205 Smoke Test ==="

          echo "1. Health endpoint..."
          HEALTH=$(curl -sf "${BACKEND_URL}/health" 2>&1 || true)
          echo "$HEALTH"
          if echo "$HEALTH" | grep -qi "PGRST"; then
            echo "::error::PostgREST error detected in /health!"
            exit 1
          fi

          echo "2. Setores endpoint..."
          SETORES=$(curl -sf "${BACKEND_URL}/setores" 2>&1 || true)
          if echo "$SETORES" | grep -qi "PGRST205\|relation.*does not exist"; then
            echo "::error::PGRST205 schema mismatch detected in /setores!"
            exit 1
          fi

          echo "No PGRST205 errors detected."
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}

      - name: Determine migration result
        id: result
        if: always()
        run: |
          if [ "${{ steps.check.outputs.has_pending }}" = "false" ]; then
            echo "status=clean" >> $GITHUB_OUTPUT
            echo "No migrations needed."
          elif [ "${{ steps.push.outcome }}" = "success" ]; then
            echo "status=applied" >> $GITHUB_OUTPUT
            echo "Migrations applied successfully."
          elif [ "${{ steps.push.outcome }}" = "failure" ]; then
            echo "status=degraded" >> $GITHUB_OUTPUT
            echo "::warning::Migration push FAILED — deploy is DEGRADED. Manual intervention required."
            echo "::warning::Run: supabase db push --include-all --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}"
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
          fi

  deploy-frontend:
    name: Deploy Frontend (Railway)
    runs-on: ubuntu-latest
    needs: [detect-changes, apply-migrations, deploy-backend]
    if: |
      always() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Try redeploy first (faster, uses GitHub source)
          echo "Attempting redeploy..."
          if railway redeploy --service bidiq-frontend -y; then
            echo "Redeploy triggered successfully"
            exit 0
          fi

          # Fallback: upload from repo root so Railway can resolve Root Directory = frontend
          echo "Redeploy failed, trying upload from root..."
          for i in 1 2 3; do
            echo "Upload attempt $i..."
            if timeout 180 railway up --service bidiq-frontend --detach; then
              echo "Deploy successful"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "All deploy attempts failed"
          exit 1

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sfL "${FRONTEND_URL}" > /dev/null 2>&1; then
              echo "Frontend health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Frontend health check failed after 5 attempts"
          exit 1

  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, apply-migrations]
    if: |
      always() &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      !(needs.deploy-backend.result == 'skipped' && needs.deploy-frontend.result == 'skipped')

    steps:
      - name: Backend API smoke test
        if: needs.deploy-backend.result == 'success'
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          echo "=== Backend Smoke Tests ==="

          echo "1. Health check..."
          curl -sfL "${BACKEND_URL}/health" | python3 -m json.tool

          echo "2. Root endpoint..."
          curl -sfL "${BACKEND_URL}/" | python3 -m json.tool

          echo "3. OpenAPI docs accessible..."
          curl -sfL -o /dev/null -w "%{http_code}" "${BACKEND_URL}/docs" | grep -q 200

          echo "All backend smoke tests passed"

      - name: POST endpoint smoke test (CRIT-080)
        if: needs.deploy-backend.result == 'success'
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          echo "=== POST Smoke Test (CRIT-080 — anti-SIGSEGV) ==="
          echo "Validating POST requests not returning 502 (jemalloc/Sentry SIGSEGV guard)..."

          # CRIT-080: anti-SIGSEGV guard. Use -s (not -sf) so curl prints
          # http_code even on 4xx instead of failing + triggering `|| echo "000"`,
          # which concatenated to "404000" and broke the >=500 arithmetic.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${BACKEND_URL}/debug/post-test" 2>&1 || echo "000")
          echo "POST /debug/post-test → HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 500 ] || [ "$HTTP_CODE" = "000" ]; then
            echo "::error::POST endpoint retornou $HTTP_CODE — possível SIGSEGV/502! Verificar jemalloc/Sentry config."
            exit 1
          fi

          echo "POST smoke test passed (HTTP $HTTP_CODE)"

      - name: Frontend smoke test
        if: needs.deploy-frontend.result == 'success'
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          echo "=== Frontend Smoke Tests ==="

          echo "1. Page loads..."
          STATUS=$(curl -sfL -o /dev/null -w "%{http_code}" "${FRONTEND_URL}")
          if [ "$STATUS" != "200" ]; then
            echo "Frontend returned $STATUS"
            exit 1
          fi

          echo "2. Contains expected content..."
          curl -sfL "${FRONTEND_URL}" | grep -q "SmartLic"

          echo "All frontend smoke tests passed"

      - name: Integration smoke test
        if: needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          echo "=== Integration Smoke Tests ==="

          echo "1. POST /buscar with minimal payload..."
          RESPONSE=$(curl -sfL -X POST "${BACKEND_URL}/buscar" \
            -H "Content-Type: application/json" \
            -d '{"ufs":["SP"],"data_inicial":"2026-01-20","data_final":"2026-01-27"}' \
            -w "\n%{http_code}" 2>&1 || true)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Response code: $HTTP_CODE"

          # Accept 200 (success) or 404/422 (no results/validation) - just not 500/503
          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "Integration test failed with server error"
            exit 1
          fi

          echo "Integration smoke test passed"

      # STORY-OBS-001: detect zero-data regression in SEO programmatic pages.
      # Root cause incident (2026-04-24): /observatorio/raio-x-marco-2026 rendered
      # 200 OK with Total=0 editais because pncp_raw_bids was hard-purged after
      # 12 days. Retention now 400d; this guard catches recurrences.
      - name: SEO programmatic pages — zero-data guard
        if: needs.deploy-backend.result == 'success'
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          set -euo pipefail
          echo "=== SEO zero-data guard (observatorio) ==="

          # 1. Backend — observatorio endpoint must return total_editais > 0
          #    for the previous full month (guaranteed to have data under 400d retention).
          PREV_MONTH=$(date -u -d '15 days ago' +'%-m')
          PREV_YEAR=$(date -u -d '15 days ago' +'%Y')
          echo "Checking /v1/observatorio/relatorio/${PREV_MONTH}/${PREV_YEAR}..."

          API_RESPONSE=$(curl -sfL "${BACKEND_URL}/v1/observatorio/relatorio/${PREV_MONTH}/${PREV_YEAR}")
          TOTAL=$(echo "$API_RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("total_editais", 0))')
          VALOR=$(echo "$API_RESPONSE" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("valor_total", 0))')
          echo "Backend: total_editais=${TOTAL} valor_total=${VALOR}"

          if [ "$TOTAL" = "0" ] || [ "$TOTAL" = "" ]; then
            echo "::error::SEO regression — /v1/observatorio/relatorio/${PREV_MONTH}/${PREV_YEAR} returned total_editais=0."
            echo "::error::This indicates pncp_raw_bids has no rows for the previous month (purge too aggressive, ingestion failed, or backfill pending)."
            echo "::error::Fix: run scripts/backfill_pncp_historical.py and/or verify purge-old-bids pg_cron is using retention=400."
            exit 1
          fi

          # 2. Frontend — the slug page must not render "0 editais" in the primary metric.
          SLUG_MONTHS=(janeiro fevereiro marco abril maio junho julho agosto setembro outubro novembro dezembro)
          SLUG_MES="${SLUG_MONTHS[$((PREV_MONTH-1))]}"
          SLUG="raio-x-${SLUG_MES}-${PREV_YEAR}"
          echo "Checking ${FRONTEND_URL}/observatorio/${SLUG}..."

          HTML=$(curl -sfL "${FRONTEND_URL}/observatorio/${SLUG}" || echo "__FETCH_FAILED__")
          if [ "$HTML" = "__FETCH_FAILED__" ]; then
            echo "::warning::Frontend fetch failed — skipping HTML content check (backend guard already passed)."
          else
            # Heuristic: the page should contain the numeric total formatted pt-BR.
            # If the total is 0, the card renders literal "0" inside the TOTAL DE EDITAIS section.
            # We look for "total de editais" context and verify the number nearby is not zero.
            if echo "$HTML" | grep -qi "TOTAL DE EDITAIS"; then
              echo "Frontend page loaded with TOTAL DE EDITAIS section."
            else
              echo "::warning::Could not locate TOTAL DE EDITAIS section — slug may not be pre-rendered yet (ISR warmup). Continuing."
            fi
          fi

          echo "SEO zero-data guard passed (previous month has ${TOTAL} editais)."

  notify-slack:
    name: Slack Deploy Notification
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-backend, deploy-frontend, smoke-tests, apply-migrations]
    if: always()
    steps:
      - name: Check for Slack webhook
        id: check_webhook
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "SLACK_DEPLOY_WEBHOOK not set, skipping notification"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Prepare notification payload
        if: steps.check_webhook.outputs.skip != 'true'
        id: payload
        run: |
          # Determine overall status
          BACKEND_STATUS="${{ needs.deploy-backend.result }}"
          FRONTEND_STATUS="${{ needs.deploy-frontend.result }}"
          SMOKE_STATUS="${{ needs.smoke-tests.result }}"
          MIGRATION_STATUS="${{ needs.apply-migrations.outputs.status }}"

          # Overall status: failure if any deploy failed, success if all succeeded/skipped
          if [ "$BACKEND_STATUS" = "failure" ] || [ "$FRONTEND_STATUS" = "failure" ]; then
            OVERALL="failure"
            EMOJI="❌"
            COLOR="#dc3545"
          elif [ "$SMOKE_STATUS" = "failure" ] || [ "$MIGRATION_STATUS" = "degraded" ]; then
            OVERALL="warning"
            EMOJI="⚠️"
            COLOR="#ffc107"
          else
            OVERALL="success"
            EMOJI="✅"
            COLOR="#28a745"
          fi

          # Determine which services were deployed
          SERVICES=""
          if [ "$BACKEND_STATUS" = "success" ]; then
            SERVICES="Backend"
          fi
          if [ "$FRONTEND_STATUS" = "success" ]; then
            if [ -n "$SERVICES" ]; then
              SERVICES="$SERVICES + Frontend"
            else
              SERVICES="Frontend"
            fi
          fi
          if [ -z "$SERVICES" ]; then
            SERVICES="None (all skipped or failed)"
          fi

          # Short SHA
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Commit message (first line only, escape special chars for JSON)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g' | sed "s/'/\\\\'/g" | cut -c1-100)

          # Build services detail
          BACKEND_EMOJI="⏭️"
          FRONTEND_EMOJI="⏭️"
          SMOKE_EMOJI="⏭️"
          MIGRATION_EMOJI="⏭️"
          [ "$BACKEND_STATUS" = "success" ] && BACKEND_EMOJI="✅"
          [ "$BACKEND_STATUS" = "failure" ] && BACKEND_EMOJI="❌"
          [ "$FRONTEND_STATUS" = "success" ] && FRONTEND_EMOJI="✅"
          [ "$FRONTEND_STATUS" = "failure" ] && FRONTEND_EMOJI="❌"
          [ "$SMOKE_STATUS" = "success" ] && SMOKE_EMOJI="✅"
          [ "$SMOKE_STATUS" = "failure" ] && SMOKE_EMOJI="❌"
          [ "$MIGRATION_STATUS" = "applied" ] && MIGRATION_EMOJI="✅"
          [ "$MIGRATION_STATUS" = "clean" ] && MIGRATION_EMOJI="✅"
          [ "$MIGRATION_STATUS" = "degraded" ] && MIGRATION_EMOJI="⚠️"

          echo "overall=$OVERALL" >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "backend_emoji=$BACKEND_EMOJI" >> $GITHUB_OUTPUT
          echo "frontend_emoji=$FRONTEND_EMOJI" >> $GITHUB_OUTPUT
          echo "smoke_emoji=$SMOKE_EMOJI" >> $GITHUB_OUTPUT
          echo "migration_emoji=$MIGRATION_EMOJI" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        if: steps.check_webhook.outputs.skip != 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.payload.outputs.emoji }} SmartLic Production Deploy — ${{ steps.payload.outputs.overall }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Services:*\n${{ steps.payload.outputs.services }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ steps.payload.outputs.short_sha }}` — ${{ steps.payload.outputs.commit_msg }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "${{ steps.payload.outputs.backend_emoji }} Backend" },
                    { "type": "mrkdwn", "text": "${{ steps.payload.outputs.frontend_emoji }} Frontend" },
                    { "type": "mrkdwn", "text": "${{ steps.payload.outputs.migration_emoji }} Migrations" },
                    { "type": "mrkdwn", "text": "${{ steps.payload.outputs.smoke_emoji }} Smoke Tests" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
