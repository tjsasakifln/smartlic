name: SEO E2E Crawl

# SEO-E2E-CRAWL-001 (Issue #1043) — Daily production sitemap crawl to catch
# 404 regressions on programmatic SEO pages before Google de-indexes them.
#
# Runs against production (smartlic.tech); no backend/frontend servers needed.

on:
  schedule:
    - cron: '0 6 * * *'   # Daily 06:00 UTC (03:00 BRT)
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/**'

permissions:
  contents: read

concurrency:
  group: seo-e2e-crawl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    name: SEO Sitemap Crawl
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run SEO crawl test
        working-directory: frontend
        run: npx playwright test seo-crawl --project=chromium
        env:
          CI: true
          FRONTEND_URL: https://smartlic.tech

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-seo-crawl
          path: frontend/playwright-report/
          retention-days: 7
