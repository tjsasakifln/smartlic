name: "Environment Parity Check (#1917)"

# Prevents incident RES-BE-013 recurrence: detects when an env var added to
# staging (during development) has NOT been promoted to production.
#
# Three detection layers:
#   1. Railway env var comparison (staging vs production) — blocks on
#      critical drift (var in staging, missing in prod)
#   2. Supabase migration diff (unapplied migrations)
#   3. Schema contract drift (critical columns missing)
#
# Triggers:
#   - Daily 06:00 UTC — independent of PRs
#   - Manual dispatch — on-demand after deploys
#   - PRs touching env-related files — preview parity drift before merge

on:
  schedule:
    # 06:00 UTC = 03:00 BRT, before the workday starts.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to check'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - bidiq-backend
          - bidiq-frontend
  pull_request:
    paths:
      - '.env.example'
      - '.github/audit/**'
      - '.github/scripts/parity_check.py'
      - '.github/workflows/parity-check.yml'
      - 'docs/operations/env-parity-blocklist.md'
      - 'supabase/migrations/**'

permissions:
  contents: read
  issues: write

concurrency:
  group: parity-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Env var parity check ──────────────────────────────────────────────────
  env-parity:
    name: Railway env var parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Check Railway auth (staging)
        id: auth-staging
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          if railway whoami 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Railway staging auth failed — skipping staging fetch."
          fi

      - name: Check Railway auth (production)
        id: auth-prod
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if railway whoami 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Railway production auth failed — skipping prod fetch."
          fi

      - name: Resolve service list
        id: services
        run: |
          INPUT_SVC="${{ github.event.inputs.services }}"
          if [ "$INPUT_SVC" = "bidiq-backend" ]; then
            echo "list=bidiq-backend" >> "$GITHUB_OUTPUT"
          elif [ "$INPUT_SVC" = "bidiq-frontend" ]; then
            echo "list=bidiq-frontend" >> "$GITHUB_OUTPUT"
          else
            echo "list=bidiq-backend bidiq-frontend" >> "$GITHUB_OUTPUT"
          fi

      # ── Fetch + compare: backend ──────────────────────────────────────────
      - name: Fetch staging env vars (bidiq-backend)
        id: fetch-staging-backend
        if: steps.auth-staging.outputs.available == 'true'
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway variables --service bidiq-backend --kv > /tmp/staging_backend.txt
          echo "count=$(wc -l < /tmp/staging_backend.txt)" >> "$GITHUB_OUTPUT"

      - name: Fetch production env vars (bidiq-backend)
        id: fetch-prod-backend
        if: steps.auth-prod.outputs.available == 'true'
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables --service bidiq-backend --kv > /tmp/prod_backend.txt
          echo "count=$(wc -l < /tmp/prod_backend.txt)" >> "$GITHUB_OUTPUT"

      - name: Compare backend env vars
        id: compare-backend
        if: |
          steps.fetch-staging-backend.outcome == 'success' &&
          steps.fetch-prod-backend.outcome == 'success' &&
          contains(steps.services.outputs.list, 'bidiq-backend')
        run: |
          python3 .github/scripts/parity_check.py \
            --staging-file /tmp/staging_backend.txt \
            --prod-file /tmp/prod_backend.txt \
            --service bidiq-backend \
            --json > /tmp/parity_backend.json
          EXIT_CODE=$?
          cat /tmp/parity_backend.json
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          PYTHONUNBUFFERED: '1'

      # ── Fetch + compare: frontend ─────────────────────────────────────────
      - name: Fetch staging env vars (bidiq-frontend)
        id: fetch-staging-frontend
        if: steps.auth-staging.outputs.available == 'true'
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          railway variables --service bidiq-frontend --kv > /tmp/staging_frontend.txt
          echo "count=$(wc -l < /tmp/staging_frontend.txt)" >> "$GITHUB_OUTPUT"

      - name: Fetch production env vars (bidiq-frontend)
        id: fetch-prod-frontend
        if: steps.auth-prod.outputs.available == 'true'
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway variables --service bidiq-frontend --kv > /tmp/prod_frontend.txt
          echo "count=$(wc -l < /tmp/prod_frontend.txt)" >> "$GITHUB_OUTPUT"

      - name: Compare frontend env vars
        id: compare-frontend
        if: |
          steps.fetch-staging-frontend.outcome == 'success' &&
          steps.fetch-prod-frontend.outcome == 'success' &&
          contains(steps.services.outputs.list, 'bidiq-frontend')
        run: |
          python3 .github/scripts/parity_check.py \
            --staging-file /tmp/staging_frontend.txt \
            --prod-file /tmp/prod_frontend.txt \
            --service bidiq-frontend \
            --json > /tmp/parity_frontend.json
          EXIT_CODE=$?
          cat /tmp/parity_frontend.json
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          PYTHONUNBUFFERED: '1'

      - name: Summary
        if: always()
        run: |
          echo "=== Environment Parity Summary ==="
          echo ""
          echo "Staging auth: ${{ steps.auth-staging.outputs.available }}"
          echo "Production auth: ${{ steps.auth-prod.outputs.available }}"
          echo ""
          echo "Backend: staging=${{ steps.fetch-staging-backend.outcome }} / prod=${{ steps.fetch-prod-backend.outcome }} / comparison=${{ steps.compare-backend.outcome }}"
          echo "Frontend: staging=${{ steps.fetch-staging-frontend.outcome }} / prod=${{ steps.fetch-prod-frontend.outcome }} / comparison=${{ steps.compare-frontend.outcome }}"

  # ── Supabase migration check ──────────────────────────────────────────────
  migration-parity:
    name: Supabase migration parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Alpine runtime deps
        run: |
          apk add --no-cache libstdc++ libgcc 2>/dev/null || true
          echo "Runtime deps check complete"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: v2.15.8

      - name: Link project & check unapplied migrations
        id: migration-check
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          echo "=== Migration status ==="
          OUTPUT=$(supabase migration list --linked 2>&1)
          echo "$OUTPUT"

          # Dual-pass scan (CRIT-050): first row with Local+Remote non-empty
          # means applied; second (spurious) row with empty Remote is ignored.
          UNAPPLIED=$(echo "$OUTPUT" | awk -F'|' '
            NR > 2 {
              local = $1; gsub(/^[ \t]+|[ \t]+$/, "", local)
              remote = $2; gsub(/^[ \t]+|[ \t]+$/, "", remote)
              if (local == "") next
              if (local ~ /\.down/) next
              if (local !~ /^[0-9]{14}$/) next
              seen[local] = 1
              if (remote != "") applied[local] = 1
            }
            END {
              for (m in seen) {
                if (!applied[m]) print m
              }
            }
          ' | sort)

          if [ -n "$UNAPPLIED" ] || echo "$OUTPUT" | grep -q "Not applied"; then
            echo "has_unapplied=true" >> "$GITHUB_OUTPUT"

            echo ""
            echo "::error::SUPABASE MIGRATION DRIFT — unapplied migrations found!"
            if [ -n "$UNAPPLIED" ]; then
              echo "Unapplied:"
              echo "$UNAPPLIED"
            fi
            echo ""
            echo "Fix: run 'supabase db push --include-all' in production."
            echo ""
            exit 1
          fi

          echo "has_unapplied=false" >> "$GITHUB_OUTPUT"
          echo "All migrations are applied to production."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # STORY-414 AC3: Schema contract drift detection
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Supabase Python client + schema deps
        run: pip install supabase 'pydantic[email]' --quiet

      - name: Validate schema contract
        id: schema-contract
        working-directory: backend
        run: |
          set +e
          python -m schemas.contract --validate 2>&1 | tee /tmp/schema_contract_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          cat /tmp/schema_contract_output.txt

          if [ "$EXIT_CODE" -eq 1 ]; then
            MISSING=$(grep "^  - " /tmp/schema_contract_output.txt \
              | sed 's/^  - //' | tr '\n' ',' | sed 's/,$//')
            echo "has_violations=true" >> "$GITHUB_OUTPUT"
            echo "missing=${MISSING}" >> "$GITHUB_OUTPUT"
            echo "::error::SCHEMA CONTRACT VIOLATED — missing: ${MISSING}"
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Schema contract check skipped (config error — SUPABASE secrets unavailable)."
            EXIT_CODE=0
          else
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
          fi

          exit $EXIT_CODE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "=== Supabase Parity Summary ==="
          echo "Migrations applied: ${{ steps.migration-check.outputs.has_unapplied == 'false' && 'yes' || 'no' }}"
          echo "Schema contract: ${{ steps.schema-contract.outputs.has_violations == 'false' && 'ok' || steps.schema-contract.outputs.has_violations }}"

  # ── Escalation: create GitHub Issue on drift ──────────────────────────────
  escalate:
    name: Escalate drift
    runs-on: ubuntu-latest
    needs: [env-parity, migration-parity]
    # Only escalate on schedule / dispatch — never on PRs.
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (needs.env-parity.result == 'failure' || needs.migration-parity.result == 'failure')

    steps:
      - name: Create or update GitHub Issue
        uses: actions/github-script@v9
        with:
          script: |
            const envStatus = '${{ needs.env-parity.result }}';
            const migrationStatus = '${{ needs.migration-parity.result }}';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            const sections = [
              '## :warning: Environment Drift Detected',
              '',
              'Pipeline run: [' + context.runId + '](' + runUrl + ')',
              'Trigger: `' + context.eventName + '`',
              'Timestamp: ' + new Date().toISOString(),
              '',
              '### Summary',
              '| Check | Status |',
              '|-------|--------|',
              '| Railway env var parity | ' + (envStatus === 'failure' ? ':x: FAIL' : ':white_check_mark: PASS') + ' |',
              '| Supabase migration parity | ' + (migrationStatus === 'failure' ? ':x: FAIL' : ':white_check_mark: PASS') + ' |',
              '',
              '### What to do',
              ''
            ];

            if (envStatus === 'failure') {
              sections.push('**Env var drift:** Compare staging vs production variables:');
              sections.push('1. Go to the Railway dashboard for each environment');
              sections.push('2. Add any critical missing vars to production');
              sections.push('3. If intentional, update `docs/operations/env-parity-blocklist.md`');
              sections.push('');
            }

            if (migrationStatus === 'failure') {
              sections.push('**Migration drift:** Unapplied Supabase migrations detected:');
              sections.push('1. Run `supabase db push --include-all` against production');
              sections.push('2. Verify the schema contract passes afterwards');
              sections.push('3. Check that all services are compatible with the new schema');
              sections.push('');
            }

            sections.push('> _Generated by parity-check.yml — Environment Parity CI Gate (#1917)_');

            const title = 'Environment Drift Detected — ' + new Date().toISOString().slice(0, 10);
            const label = 'parity-drift';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 5,
            });

            const body = sections.join('\n');

            if (issues.length > 0) {
              const issue = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: body,
              });
              console.log('Updated existing issue #' + issue.number);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label, 'incident-prevention'],
              });
              console.log('Created new issue #' + newIssue.number);
            }

      - name: Notify Slack (if webhook configured)
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Environment Drift Detected"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The daily parity check found drift between staging and production."
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Railway env vars:*\n${{ needs.env-parity.result }}" },
                    { "type": "mrkdwn", "text": "*Migrations:*\n${{ needs.migration-parity.result }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
