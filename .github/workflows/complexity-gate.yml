name: "Complexity Gate — radon threshold enforcement"

# P1-1873: CI gate that runs radon cc on changed production Python files
# and fails the PR if average complexity exceeds thresholds or new
# functions introduce high complexity.
#
# Rules:
#   1. Average complexity per file > threshold (10 standard, 15 core >500 LOC)
#   2. Any individual function > 30 (threshold C) — fail
#   3. New functions (not in baseline) with complexity > 15 (threshold B) — fail
#
# Baseline: .radon-baseline.json — grandfathered legacy functions
# Local gate: scripts/check-complexity.sh (same logic — single source of truth)
#
# AC1 — average > 10 fails
# AC2 — tiered threshold by LOC (>500 = core, avg 15)
# AC3 — new functions > 15 blocked
# AC4 — baseline in .radon-baseline.json
# AC5 — HTML report generated as artifact
# AC7 — only runs on PRs touching backend/**/*.py (not docs/tests)

on:
  pull_request:
    paths:
      - 'backend/**/*.py'
      - '.radon-baseline.json'
      - '.github/workflows/complexity-gate.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: complexity-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  complexity-check:
    name: Complexity gate — no regressions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required for git diff against origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install radon
        run: pip install radon

      - name: Run complexity gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          # Delegate to the canonical local script — single source of truth.
          bash scripts/check-complexity.sh 2>&1
          rc=$?

          echo "passed=$([ "$rc" -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          exit $rc

      - name: Upload complexity report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: complexity-report-${{ github.sha }}
          path: /tmp/complexity-report/
          retention-days: 30
          if-no-files-found: ignore
