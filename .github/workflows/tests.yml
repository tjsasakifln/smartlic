# Unit + Integration + E2E tests on push to main. Complements backend-tests.yml
# (quality gates: pip-audit, ruff, mypy, schema validation) and frontend-tests.yml
# (PR gate). E2E job re-enabled 2026-06-18 after mock schema fix (RBAC UserProfileResponse
# alignment) + 4×4 sharding (4 workers × 4 matrix shards = 16-way parallelism, ~15 min).
# Historical: 62 consecutive cancellations prior to fix (1810 tests × 1 worker = 30h+).
#
# mission sparkling-patterson 2026-04-24: deferred to post-merge. PR gate
# is backend-tests.yml + frontend-tests.yml (those are what branch
# protection enforces). Runs on push to main/master (catches regressions
# before deploy) and workflow_dispatch (manual on-demand for risky PRs).
name: "Tests (Unit + Integration)"

on:
  push:
    branches: [master, main]
  workflow_dispatch: {}

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: tests-full-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      # CRIT-001 AC5: Validate migration prefixes
      - name: Validate migration prefixes
        run: python backend/scripts/validate_migrations.py

      - name: Run tests
        run: |
          cd backend
          if [ -d tests ]; then
            pytest tests/ \
              -m "not external" \
              --cov=. \
              --cov-report=xml \
              --cov-report=term-missing \
              --junitxml=pytest-report.xml \
              -v
          else
            echo "⚠️ No tests directory found yet (will be created in future issues)"
            echo "Skipping test execution"
          fi

      - name: Publish Backend Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/pytest-report.xml
          check_name: Backend Test Results
          comment_title: Backend Test Results

      # DEBT-123 AC9: Codecov upload — intentionally non-blocking (external service, not security)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: true
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true  # DEBT-123 AC9: intentional — external upload service may be unavailable

      - name: Check coverage threshold
        if: true
        run: |
          cd backend
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(root.attrib['line-rate'])")
            COVERAGE_PERCENT=$(python -c "print(int(float($COVERAGE) * 100))")

            echo "Coverage: $COVERAGE_PERCENT%"

            if [ $COVERAGE_PERCENT -lt 70 ]; then
              echo "❌ Coverage is below 70% threshold"
              exit 1
            fi

            echo "✅ Coverage meets threshold"
          fi

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          clean: true
          fetch-depth: 0

      - name: Verify checkout
        run: |
          echo "=== Current branch/commit ==="
          git log -1 --oneline
          echo "=== useSavedSearches.ts import line ==="
          grep -n "from.*savedSearches" frontend/hooks/useSavedSearches.ts || echo "File not found"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: Security audit (CRITICAL — blocking)
        run: |
          cd frontend
          echo "🔒 Checking for CRITICAL vulnerabilities (blocking)..."
          npm audit --audit-level=critical

      # DEBT-123 AC9: HIGH audit — intentionally non-blocking (CRITICAL is already blocking above)
      - name: Security audit (HIGH — warning only)
        run: |
          cd frontend
          echo "⚠️ Checking for HIGH vulnerabilities (non-blocking)..."
          npm audit --audit-level=high || echo "⚠️ HIGH vulnerabilities found — review recommended"
        continue-on-error: true  # DEBT-123 AC9: intentional — CRITICAL already blocking, HIGH is advisory

      - name: Clear all caches
        run: |
          cd frontend
          if [ -f package.json ]; then
            # Clear Jest cache
            npx jest --clearCache || true
            # Clear node_modules/.cache
            rm -rf node_modules/.cache || true
            # Clear .next cache (if exists)
            rm -rf .next || true
          fi

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit --pretty

      - name: Verify generated API types are committed
        run: |
          cd frontend
          if [ ! -f app/api-types.generated.ts ]; then
            echo "❌ Generated API types file not found: app/api-types.generated.ts"
            echo "Run: npm run generate:api-types"
            exit 1
          fi
          echo "✅ Generated API types file exists"

      - name: Run tests with coverage
        run: |
          cd frontend
          if [ -f package.json ]; then
            # Run with --no-cache to force fresh run
            npm test -- --coverage --ci --no-cache
          fi

      # DEBT-123 AC9: Quarantined tests — intentionally non-blocking (known flaky tests under investigation)
      - name: Run quarantined tests (non-blocking)
        run: |
          cd frontend
          npm run test:quarantine -- --ci --no-cache || true
        continue-on-error: true  # DEBT-123 AC9: intentional — quarantined tests are known-flaky, tracked separately

      - name: Publish Frontend Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Frontend Test Results
          path: frontend/junit.xml
          reporter: jest-junit
          fail-on-error: true

      # DEBT-123 AC9: Codecov upload — intentionally non-blocking (external service, not security)
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
        continue-on-error: true  # DEBT-123 AC9: intentional — external upload service may be unavailable

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests] # Run integration only if unit tests pass

    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: sk-test-key
      ENCRYPTION_KEY: bzc732A921Puw9JN4lrzMo1nw0EjlcUdAyR6Z6N7Sqc=
      ENVIRONMENT: test
      SENTRY_DSN: ""
      REDIS_URL: ""
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/integration/ -v -m "integration and not external" --tb=short 2>&1 || true
        timeout-minutes: 10

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: backend/tests/integration/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (shard ${{ matrix.shard }}/${{ matrix.total_shards }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-tests, frontend-tests]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total_shards: [4]

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-fallback-key' }}
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python (Backend)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js (Frontend)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in {1..30}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
          echo "Backend failed to start"
          cat backend.log
          exit 1

      - name: Build and start frontend server
        working-directory: frontend
        run: |
          npm run build
          if [ -f .next/standalone/server.js ]; then
            node .next/standalone/server.js > frontend.log 2>&1 &
          else
            npx next start > frontend.log 2>&1 &
          fi
          FRONTEND_PID=$!
          echo "FRONTEND_PID=$FRONTEND_PID" >> $GITHUB_ENV
          for i in {1..60}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 1
          done
          echo "Frontend failed to start"
          cat frontend.log
          exit 1

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ matrix.total_shards }})
        working-directory: frontend
        run: npx playwright test --shard=${{ matrix.shard }}/${{ matrix.total_shards }}
        env:
          CI: true

      - name: Stop services
        if: always()
        run: |
          [ -n "$BACKEND_PID" ] && kill $BACKEND_PID || true
          [ -n "$FRONTEND_PID" ] && kill $FRONTEND_PID || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs-e2e-shard-${{ matrix.shard }}
          path: |
            backend/backend.log
            frontend/frontend.log
          retention-days: 7
