name: "Weekly Backup Restore Test (#1864)"

# P0 Database backup restore test — validates RTO/RPO against production backup.
#
# Triggers:
#   - Weekly Sunday 00:00 UTC (low traffic window, AC5)
#   - Manual dispatch for on-demand testing
#
# Prerequisites:
#   SUPABASE_DB_URL         — production database URL (secrets.SUPABASE_DB_URL)
#   RESTORE_TARGET_DB_URL   — SEPARATE PostgreSQL instance for restore test (secrets)
#   AWS_ACCESS_KEY_ID       — (optional) for --from-s3 mode
#   AWS_SECRET_ACCESS_KEY   — (optional) for --from-s3 mode
#
# The restore target MUST be a different database from production.
# Common targets: ephemeral PostgreSQL on Railway test, local Docker, or Supabase branch.

on:
  schedule:
    # Domingo 00:00 UTC — lowest traffic window
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Restore test mode'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - s3
        # live: pg_dump from production then restore to target (no S3 dependency)
        # s3:   download latest backup from S3 then restore to target
      threshold:
        description: 'RTO threshold in minutes'
        required: false
        default: '30'
        type: number
      skip_cleanup:
        description: 'Keep restored schema for inspection'
        required: false
        default: false
        type: boolean

env:
  PG_CLIENT_VERSION: "16"

concurrency:
  group: backup-restore-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  restore-test:
    name: Restore Test
    # Disabled by default until RESTORE_TARGET_DB_URL is configured in GitHub Secrets.
    # Enable by setting the secret and removing this conditional.
    if: ${{ secrets.RESTORE_TARGET_DB_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 30min RTO + margin for download/verification

    steps:
      - uses: actions/checkout@v6

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
          psql --version
          pg_restore --version

      - name: Install aws CLI (S3 mode only)
        if: ${{ github.event.inputs.mode == 's3' }}
        run: |
          sudo apt-get install -y --no-install-recommends awscli
          aws --version

      - name: Configure test parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=live" >> $GITHUB_OUTPUT
            echo "threshold=30" >> $GITHUB_OUTPUT
            echo "skip_cleanup=false" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "threshold=${{ github.event.inputs.threshold }}" >> $GITHUB_OUTPUT
            echo "skip_cleanup=${{ github.event.inputs.skip_cleanup }}" >> $GITHUB_OUTPUT
          fi
          echo "Report file: restore_test_$(date -u +%Y%m%d_%H%M%S).md"

      - name: Run restore test
        id: test
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RESTORE_TARGET_DB_URL: ${{ secrets.RESTORE_TARGET_DB_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BACKUP_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_BACKUP_REGION || 'us-east-1' }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          REPORT_FILE="restore_test_${TIMESTAMP}.md"

          ARGS=(
            --target-url "$RESTORE_TARGET_DB_URL"
            --threshold "${{ steps.params.outputs.threshold }}"
            --save-report "$REPORT_FILE"
          )

          if [ "${{ steps.params.outputs.skip_cleanup }}" = "true" ]; then
            ARGS+=(--skip-cleanup)
          fi

          if [ "${{ steps.params.outputs.mode }}" = "live" ]; then
            ARGS+=(--source-url "$SUPABASE_DB_URL")
          elif [ "${{ steps.params.outputs.mode }}" = "s3" ]; then
            # Find latest backup in S3
            BUCKET="${{ vars.BACKUP_S3_BUCKET }}"
            if [ -z "$BUCKET" ]; then
              echo "::error::BACKUP_S3_BUCKET variable not set for S3 mode"
              exit 1
            fi
            LATEST=$(aws s3 ls "s3://${BUCKET}/db-backups/" | sort -r | head -1 | awk '{print $4}')
            if [ -z "$LATEST" ]; then
              echo "::error::No backups found in s3://${BUCKET}/db-backups/"
              exit 1
            fi
            ARGS+=(--from-s3 "s3://${BUCKET}/db-backups/${LATEST}")
          fi

          echo "=== Running restore test ==="
          echo "Mode: ${{ steps.params.outputs.mode }}"
          echo "Threshold: ${{ steps.params.outputs.threshold }}min"

          bash scripts/backup-restore-test.sh "${ARGS[@]}" 2>&1
          EXIT_CODE=$?

          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "report_file=${REPORT_FILE}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-restore-report-${{ steps.test.outputs.timestamp }}
          path: restore_test_*.md
          if-no-files-found: ignore
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backup restore test FAILED (exit code ${{ steps.test.outputs.exit_code }})."
          echo "::error::Review the report artifact for details."
          echo "::error::RTO violation — restore check needed."
          echo ""
          echo "## Backup Restore Test FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ steps.params.outputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Threshold | ${{ steps.params.outputs.threshold }} min |" >> $GITHUB_STEP_SUMMARY
          echo "| Exit Code | ${{ steps.test.outputs.exit_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Action Required" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the report artifact from this run" >> $GITHUB_STEP_SUMMARY
          echo "2. Review restore logs and post-restore checks" >> $GITHUB_STEP_SUMMARY
          echo "3. Fix underlying issue (backup corruption, slow restore, etc.)" >> $GITHUB_STEP_SUMMARY
          echo "4. Run backup repair or adjust infrastructure" >> $GITHUB_STEP_SUMMARY

      - name: All clear summary
        if: success()
        run: |
          echo "## Backup Restore Test PASSED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ steps.params.outputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RTO Threshold | ${{ steps.params.outputs.threshold }} min |" >> $GITHUB_STEP_SUMMARY
          echo "| Exit Code | ${{ steps.test.outputs.exit_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Backup verified: restore works, RTO compliant, integrity checks passed." >> $GITHUB_STEP_SUMMARY
