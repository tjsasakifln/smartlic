name: Phase 0 Gate Reminder

on:
  schedule:
    # 09:00 BRT (12:00 UTC) on 2026-05-21 — Phase 0 evaluation day
    - cron: '0 12 21 5 *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Create Phase 0 Gate Evaluation Reminder Issue
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 [GATE] Phase 0 14d evaluation — ${today}`,
              body: `## Phase 0 Gate Decision — 14d Post-Deploy\n\n**Evaluation doc:** \`docs/sessions/2026-05/2026-05-21-phase0-gate-decision.md\`\n\n### Actions Required\n1. Pull Mixpanel \`form_submitted\` events (distinct sessions, last 14d)\n2. Query Supabase \`lead_capture\` for modalidade breakdown + valid CNPJ leads\n3. Populate the gate doc with actual metrics\n4. Apply PASS/FAIL verdict\n5. If PASS → spawn Phase 1 issues\n6. If FAIL → convene \`/conselho\` for re-tese or Intel Reports T0 pivot\n\n### PASS Criteria (all 3 required)\n- ≥10 distinct \`form_submitted\` sessions\n- ≥1 modalidade ≠ \`nao_sei\`\n- ≥1 lead with valid CNPJ + setor preenchido\n\n### FAIL → Options\n- Re-tese: new messaging, another 14d window\n- Pivot: Intel Reports T0 direct monetization\n\n_Auto-generated by \`.github/workflows/phase0-gate-reminder.yml\`_`,
              labels: ['p0', 'gate'],
            });
            console.log('Phase 0 Gate reminder issue created.');
