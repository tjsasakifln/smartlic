name: "Build Budget Guard"

# OPS-CI-001 — Frontend bundle gzip + Backend Docker build time budget guard.
# Refs: memory project_bundle_size_budget (1.75MB cap), project_backend_outage_2026_04_29_stage5

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/Dockerfile'
      - 'backend/requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/next.config.js'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-budget-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-bundle-budget:
    name: Frontend Bundle Gzip Budget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      bundle_bytes: ${{ steps.measure.outputs.bundle_bytes }}
      baseline_bytes: ${{ steps.measure.outputs.baseline_bytes }}
      delta_pct: ${{ steps.measure.outputs.delta_pct }}
      verdict: ${{ steps.measure.outputs.verdict }}
      build_ok: ${{ steps.build.outputs.build_ok }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build frontend (best-effort, capture exit)
        id: build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          set +e
          start_ts=$(date +%s)
          timeout 600 npm run build --prefix frontend > /tmp/build.log 2>&1
          rc=$?
          end_ts=$(date +%s)
          elapsed=$((end_ts - start_ts))
          if [[ $rc -ne 0 ]]; then
            echo "::warning::Frontend build failed or timed out (rc=$rc, elapsed=${elapsed}s). Skipping bundle measurement; will record verdict=build_failed."
            {
              echo "build_elapsed_seconds=$elapsed"
              echo "build_ok=false"
              echo "build_rc=$rc"
            } >> "$GITHUB_OUTPUT"
            tail -50 /tmp/build.log || true
          else
            {
              echo "build_elapsed_seconds=$elapsed"
              echo "build_ok=true"
              echo "build_rc=0"
            } >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Measure bundle gzip + compare baseline
        id: measure
        run: |
          set -euo pipefail

          BASELINE_FILE=".github/baselines/build-budget.json"
          if [[ ! -f "$BASELINE_FILE" ]]; then
            echo "::error::Baseline file missing: $BASELINE_FILE"
            exit 1
          fi

          baseline_bytes=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['frontend_bundle_gzip_bytes'])")
          warn_pct=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['frontend_bundle_gzip_warning_pct'])")
          fail_pct=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['frontend_bundle_gzip_fail_pct'])")

          {
            echo "baseline_bytes=$baseline_bytes"
            echo "warn_pct=$warn_pct"
            echo "fail_pct=$fail_pct"
          } >> "$GITHUB_OUTPUT"

          build_ok="${{ steps.build.outputs.build_ok }}"
          if [[ "$build_ok" != "true" ]]; then
            echo "Build did not complete; cannot measure bundle. Verdict: build_failed."
            {
              echo "bundle_bytes=0"
              echo "delta_pct=0"
              echo "verdict=build_failed"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          chmod +x scripts/measure-frontend-bundle.sh
          bundle_bytes=$(scripts/measure-frontend-bundle.sh frontend)
          echo "Measured bundle bytes: $bundle_bytes"
          echo "Baseline bytes: $baseline_bytes (warn=${warn_pct}%, fail=${fail_pct}%)"

          if [[ -z "$bundle_bytes" || "$bundle_bytes" -le 0 ]]; then
            echo "::error::Bundle measurement returned 0 — chunks dir empty or missing."
            {
              echo "bundle_bytes=0"
              echo "delta_pct=0"
              echo "verdict=measurement_failed"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          delta_pct=$(python3 -c "print(round(($bundle_bytes / $baseline_bytes) * 100, 1))")
          echo "Delta vs baseline: ${delta_pct}%"
          {
            echo "bundle_bytes=$bundle_bytes"
            echo "delta_pct=$delta_pct"
          } >> "$GITHUB_OUTPUT"

          # Verdict
          fail_threshold_bytes=$(python3 -c "print(int($baseline_bytes * $fail_pct / 100))")
          warn_threshold_bytes=$(python3 -c "print(int($baseline_bytes * $warn_pct / 100))")
          hard_cap_bytes=1835008  # 1.75 MB hard cap

          verdict="ok"
          if [[ "$bundle_bytes" -gt "$hard_cap_bytes" ]]; then
            verdict="fail_hard_cap"
          elif [[ "$bundle_bytes" -gt "$fail_threshold_bytes" ]]; then
            verdict="fail_drift"
          elif [[ "$bundle_bytes" -gt "$warn_threshold_bytes" ]]; then
            verdict="warn"
          fi
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          echo "Verdict: $verdict"

          if [[ "$verdict" == "fail_hard_cap" ]]; then
            echo "::error::Bundle size $bundle_bytes bytes exceeds hard cap 1.75 MB ($hard_cap_bytes bytes)."
            exit 1
          fi
          if [[ "$verdict" == "fail_drift" ]]; then
            echo "::error::Bundle size $bundle_bytes bytes exceeds baseline by >${fail_pct}% (threshold $fail_threshold_bytes)."
            exit 1
          fi
          if [[ "$verdict" == "warn" ]]; then
            echo "::warning::Bundle size $bundle_bytes bytes exceeds warning threshold ${warn_pct}% (threshold $warn_threshold_bytes)."
          fi

      - name: Upload bundle report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-budget-${{ github.sha }}
          path: |
            /tmp/build.log
          retention-days: 30
          if-no-files-found: ignore

  backend-docker-build-time:
    name: Backend Docker Build Time Budget
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      build_seconds: ${{ steps.dockerbuild.outputs.build_seconds }}
      baseline_seconds: ${{ steps.dockerbuild.outputs.baseline_seconds }}
      delta_pct: ${{ steps.dockerbuild.outputs.delta_pct }}
      verdict: ${{ steps.dockerbuild.outputs.verdict }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image (timed)
        id: dockerbuild
        run: |
          set -euo pipefail

          BASELINE_FILE=".github/baselines/build-budget.json"
          baseline_seconds=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['backend_docker_build_seconds'])")
          warn_pct=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['backend_docker_build_warning_pct'])")
          fail_pct=$(python3 -c "import json; print(json.load(open('$BASELINE_FILE'))['backend_docker_build_fail_pct'])")
          echo "baseline_seconds=$baseline_seconds" >> "$GITHUB_OUTPUT"

          start_ts=$(date +%s)
          set +e
          docker buildx build \
            --file backend/Dockerfile \
            --tag bidiq-backend:budget-test \
            --load \
            --progress plain \
            backend > /tmp/docker-build.log 2>&1
          rc=$?
          set -e
          end_ts=$(date +%s)
          elapsed=$((end_ts - start_ts))
          echo "Build elapsed: ${elapsed}s (rc=$rc)"
          echo "build_seconds=$elapsed" >> "$GITHUB_OUTPUT"

          if [[ $rc -ne 0 ]]; then
            echo "::warning::Backend Docker build failed (rc=$rc, elapsed=${elapsed}s). Recording verdict=build_failed."
            {
              echo "delta_pct=0"
              echo "verdict=build_failed"
            } >> "$GITHUB_OUTPUT"
            tail -50 /tmp/docker-build.log || true
            exit 0
          fi

          delta_pct=$(python3 -c "print(round(($elapsed / $baseline_seconds) * 100, 1))")
          echo "delta_pct=$delta_pct" >> "$GITHUB_OUTPUT"
          echo "Delta vs baseline: ${delta_pct}%"

          fail_threshold=$(python3 -c "print(int($baseline_seconds * $fail_pct / 100))")
          warn_threshold=$(python3 -c "print(int($baseline_seconds * $warn_pct / 100))")

          verdict="ok"
          if [[ "$elapsed" -gt "$fail_threshold" ]]; then
            verdict="fail_drift"
          elif [[ "$elapsed" -gt "$warn_threshold" ]]; then
            verdict="warn"
          fi
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          echo "Verdict: $verdict"

          if [[ "$verdict" == "fail_drift" ]]; then
            echo "::error::Backend Docker build ${elapsed}s exceeds baseline by >${fail_pct}% (threshold ${fail_threshold}s)."
            exit 1
          fi
          if [[ "$verdict" == "warn" ]]; then
            echo "::warning::Backend Docker build ${elapsed}s exceeds warning threshold ${warn_pct}% (threshold ${warn_threshold}s)."
          fi

      - name: Upload docker build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-docker-build-${{ github.sha }}
          path: /tmp/docker-build.log
          retention-days: 30
          if-no-files-found: ignore

  summary-comment:
    name: Post PR Summary Comment
    runs-on: ubuntu-latest
    needs:
      - frontend-bundle-budget
      - backend-docker-build-time
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Compose and post comment
        uses: actions/github-script@v9
        with:
          script: |
            const fmtBytes = (n) => {
              const num = Number(n);
              if (!Number.isFinite(num) || num <= 0) return 'n/a';
              if (num >= 1024 * 1024) return `${(num / (1024 * 1024)).toFixed(2)} MB`;
              if (num >= 1024) return `${(num / 1024).toFixed(1)} KB`;
              return `${num} B`;
            };
            const fmtSec = (n) => {
              const num = Number(n);
              if (!Number.isFinite(num) || num <= 0) return 'n/a';
              if (num >= 60) {
                const m = Math.floor(num / 60);
                const s = num % 60;
                return `${m}m${s}s`;
              }
              return `${num}s`;
            };
            const statusEmoji = (verdict) => {
              switch (verdict) {
                case 'ok': return '✅';
                case 'warn': return '⚠️';
                case 'fail_drift':
                case 'fail_hard_cap': return '❌';
                case 'build_failed':
                case 'measurement_failed': return '🚫';
                default: return '❔';
              }
            };

            const fe = {
              bundle_bytes: '${{ needs.frontend-bundle-budget.outputs.bundle_bytes }}',
              baseline_bytes: '${{ needs.frontend-bundle-budget.outputs.baseline_bytes }}',
              delta_pct: '${{ needs.frontend-bundle-budget.outputs.delta_pct }}',
              verdict: '${{ needs.frontend-bundle-budget.outputs.verdict }}',
              build_ok: '${{ needs.frontend-bundle-budget.outputs.build_ok }}',
            };
            const be = {
              build_seconds: '${{ needs.backend-docker-build-time.outputs.build_seconds }}',
              baseline_seconds: '${{ needs.backend-docker-build-time.outputs.baseline_seconds }}',
              delta_pct: '${{ needs.backend-docker-build-time.outputs.delta_pct }}',
              verdict: '${{ needs.backend-docker-build-time.outputs.verdict }}',
            };

            const body = [
              '## 🛡️ Build Budget Guard',
              '',
              '_OPS-CI-001 — auto-generated. Hard cap: frontend gzip ≤ 1.75 MB; backend Docker build drift ≤ 30%._',
              '',
              '| Metric | Current | Baseline | Δ | Verdict |',
              '|---|---|---|---|---|',
              `| Frontend bundle (gzip) | ${fmtBytes(fe.bundle_bytes)} | ${fmtBytes(fe.baseline_bytes)} | ${fe.delta_pct || 'n/a'}% | ${statusEmoji(fe.verdict)} \`${fe.verdict || 'unknown'}\` |`,
              `| Backend Docker build | ${fmtSec(be.build_seconds)} | ${fmtSec(be.baseline_seconds)} | ${be.delta_pct || 'n/a'}% | ${statusEmoji(be.verdict)} \`${be.verdict || 'unknown'}\` |`,
              '',
              `Frontend build status: \`${fe.build_ok || 'unknown'}\``,
              '',
              `<sub>Refs: \`memory project_bundle_size_budget\`, \`memory project_backend_outage_2026_04_29_stage5\`. Baselines in \`.github/baselines/build-budget.json\`.</sub>`,
            ].join('\n');

            const marker = '<!-- build-budget-guard-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
              core.info(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
              core.info('Created new comment');
            }
