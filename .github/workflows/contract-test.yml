# Issue #1970: Contract tests backend↔frontend — OpenAPI schema compliance.
#
# Purpose: Validate that actual API responses conform to the OpenAPI schema.
# Prevents silent frontend breaks when backend schemas change.
#
# Design:
# - Uses FastAPI TestClient (no server needed) directly against the app.
# - Validates response bodies against expected JSON Schemas from
#   scripts/contract-specs/expected-schemas.json.
# - Runs the same contract-tests.sh script used locally.
#
# Critical: This workflow runs on PRs touching backend code OR the contract
# test specs themselves, ensuring every schema change is validated against
# the expected frontend contracts.

name: "Contract Tests"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'backend/routes/**'
      - 'backend/schemas/**'
      - 'backend/main.py'
      - 'backend/startup/**'
      - 'scripts/contract-tests.sh'
      - 'scripts/contract-specs/**'
      - '.github/workflows/contract-test.yml'
  push:
    branches: [main]
    paths:
      - 'backend/routes/**'
      - 'backend/schemas/**'
      - 'backend/main.py'
      - 'backend/startup/**'
      - 'scripts/contract-tests.sh'
      - 'scripts/contract-specs/**'
      - '.github/workflows/contract-test.yml'

permissions:
  contents: read
  pull-requests: write  # Post comment with test results

concurrency:
  group: contract-test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  contract-test:
    name: Validate endpoint responses match OpenAPI schema
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: sk-test-key
      ENCRYPTION_KEY: bzc732A921Puw9JN4lrzMo1nw0EjlcUdAyR6Z6N7Sqc=
      ENVIRONMENT: test
      SENTRY_DSN: ""
      REDIS_URL: ""
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install contract test dependencies
        run: |
          pip install jsonschema httpx

      - name: List contract test specs
        run: |
          ./scripts/contract-tests.sh --list-only

      - name: Run contract tests
        id: contract-tests
        run: |
          ./scripts/contract-tests.sh 2>&1 | tee /tmp/contract-test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.contract-tests.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/contract-test-output.txt', 'utf8');
            const passed = process.env.EXIT_CODE === '0';

            const header = passed
              ? '## Contract Tests: PASS'
              : '## Contract Tests: FAIL';

            const body = output.length > 30000
              ? output.slice(0, 30000) + '\n\n... (truncado, veja logs completos no CI)'
              : output;

            const comment = `${header}\n\n\`\`\`\n${body}\n\`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail on contract test failure
        if: steps.contract-tests.outputs.exit_code != '0'
        run: |
          echo "::error title=Contract test failure::API responses do not match expected schema. Check logs above or PR comment for details."
          exit 1
