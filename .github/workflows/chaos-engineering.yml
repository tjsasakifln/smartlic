# Chaos Engineering — Weekly Automated Experiments (#1961)
#
# Runs chaos experiments against the staging environment on a weekly
# schedule. Supports manual dispatch for ad-hoc testing.
#
# Scenarios:
#   a - Redis connection kill (CLIENT PAUSE)
#   b - Redis high latency (CLIENT PAUSE bursts)
#   c - DB connection pool exhaustion (Supabase REST connections)
#   d - DB slow query (pg_sleep via Supabase REST)
#
# Safety:
#   - NEVER targets production (hardcoded guard in script)
#   - Auto-rollback if 5xx errors exceed 10% threshold
#   - All faults auto-revert via cleanup trap
#   - Rollback threshold and 5xx pass threshold configurable via inputs
#
# Success metrics:
#   - <5% 5xx errors during fault
#   - Recovery within 30s after fault removal
#   - Zero data lost (verified by health endpoint data integrity checks)
#
# Secrets needed (configure in GitHub Settings > Secrets > Actions):
#   SUPABASE_URL               — Supabase project URL (for DB scenarios C/D)
#   SUPABASE_SERVICE_ROLE_KEY  — Supabase service role key (for DB scenarios C/D)
#   REDIS_URL                  — Redis connection URL (for Redis scenarios A/B)
#   STAGING_URL                — Staging URL (default: https://staging.smartlic.tech)
#
# Output: JSON report posted to workflow summary + GitHub issue on failure

name: "Chaos Engineering — Weekly Experiments"

on:
  schedule:
    # Sunday 03:00 UTC — off-peak, before ingestion pipeline
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - a    # Redis connection kill
          - b    # Redis high latency
          - c    # DB pool exhaustion
          - d    # DB slow query
      observation_seconds:
        description: 'Observation duration per scenario (seconds)'
        required: false
        default: '60'
      fivexx_threshold:
        description: '5xx error threshold % for pass/fail'
        required: false
        default: '5'
      rollback_threshold:
        description: 'Auto-rollback if 5xx exceeds this %'
        required: false
        default: '10'

permissions:
  contents: read
  issues: write   # Required to create failure report issue

concurrency:
  group: chaos-engineering-${{ github.ref }}
  cancel-in-progress: true

env:
  STAGING_URL: ${{ secrets.STAGING_URL || 'https://staging.smartlic.tech' }}
  REDIS_URL: ${{ secrets.REDIS_URL || '' }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}

jobs:
  chaos-experiment:
    name: Chaos Experiment
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      status: ${{ steps.run-experiment.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc curl jq redis-tools python3-pip
          pip install httpx --quiet

      - name: Verify staging reachable
        id: verify-staging
        run: |
          echo "Verifying staging at ${STAGING_URL}..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "${STAGING_URL}/health/live" 2>/dev/null || echo "000")
          if [ "${STATUS}" != "200" ]; then
            echo "::warning::Staging ${STAGING_URL} returned HTTP ${STATUS}"
            echo "Workflow will continue but results may be affected."
          else
            echo "Staging reachable (HTTP ${STATUS})"
          fi
          echo "status=${STATUS}" >> $GITHUB_OUTPUT

      - name: Write Python helper scripts
        run: |
          python3 -c "open('/tmp/extract_last_json.py','w').write('import sys\nfor l in reversed(sys.stdin.readlines()):\n  l=l.strip()\n  if l.startswith(\"{\"): print(l); break\n')"
          python3 -c "open('/tmp/format_scenarios.py','w').write('import sys,json\nd=json.load(sys.stdin)\nfor s in d.get(\"scenarios\",[]):\n  m=s.get(\"metrics\",{})\n  print(f\\'{s[\"id\"]}) {s[\"name\"]}: {s[\"status\"]} (5xx={m.get(\"five_xx_pct\",\"?\")}%)\\'')\""
          python3 -c "open('/tmp/format_issue_detail.py','w').write('import sys,json\nd=json.load(sys.stdin)\nfor s in d.get(\"scenarios\",[]):\n  m=s.get(\"metrics\",{})\n  print(f\\'- **{s[\"id\"]}** ({s[\"name\"]}): {s[\"status\"]}\\'')\n  print(f'  - 5xx: {m.get(\"five_xx_pct\",\"?\")}%')\n  print(f'  - Healthy: {m.get(\"healthy\",\"?\")}/{m.get(\"total\",\"?\")}')\n  print(f'  - Degraded: {m.get(\"degraded\",\"?\")}')\n  print(f'  - P99 RTT: {m.get(\"p99_rtt_ms\",\"?\")}ms')')"

      - name: Run chaos experiment
        id: run-experiment
        env:
          STAGING_URL: ${{ env.STAGING_URL }}
          REDIS_URL_ENV: ${{ env.REDIS_URL }}
          SUPABASE_URL_ENV: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          CMD="bash scripts/chaos/chaos-ci-runner.sh"
          CMD="${CMD} --url '${STAGING_URL}'"
          if [[ -n "${REDIS_URL_ENV}" ]]; then
            CMD="${CMD} --redis-url '${REDIS_URL_ENV}'"
          fi
          if [[ -n "${SUPABASE_URL_ENV}" && -n "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            CMD="${CMD} --supabase-url '${SUPABASE_URL_ENV}' --supabase-key '${SUPABASE_SERVICE_ROLE_KEY}'"
          fi
          SCENARIO_INPUT="${{ inputs.scenario || 'all' }}"
          OBSERVATION_INPUT="${{ inputs.observation_seconds || '60' }}"
          FIVEX_INPUT="${{ inputs.fivexx_threshold || '5' }}"
          ROLLBACK_INPUT="${{ inputs.rollback_threshold || '10' }}"
          CMD="${CMD} --scenario '${SCENARIO_INPUT}'"
          CMD="${CMD} --observation ${OBSERVATION_INPUT}"
          CMD="${CMD} --fivexx-threshold ${FIVEX_INPUT}"
          CMD="${CMD} --rollback-threshold ${ROLLBACK_INPUT}"
          set +e
          echo "::group::Chaos Experiment Output"
          eval "${CMD}" 2>&1 | tee /tmp/chaos-output.txt
          EXIT_CODE=$?
          echo "::endgroup::"
          REPORT=$(tail -200 /tmp/chaos-output.txt | python3 /tmp/extract_last_json.py 2>/dev/null || echo '{}')
          STATUS=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo 'error')
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "${REPORT}" > /tmp/chaos-report.json
          exit ${EXIT_CODE}
        continue-on-error: true

      - name: Post experiment summary to workflow
        if: always()
        run: |
          REPORT=$(cat /tmp/chaos-report.json 2>/dev/null || echo '{}')
          STATUS=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo 'unknown')
          EXECUTED=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('executed',0))" 2>/dev/null || echo '0')
          SKIPPED=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('skipped',0))" 2>/dev/null || echo '0')
          FIVEX=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('overall_five_xx_pct',0))" 2>/dev/null || echo '0')
          ROLLBACK=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('auto_rollback_triggered',False))" 2>/dev/null || echo 'false')
          SCENARIOS=$(echo "${REPORT}" | python3 /tmp/format_scenarios.py 2>/dev/null || echo '(no scenario data)')
          cat >> $GITHUB_STEP_SUMMARY << 'SUM_EOF'
          ## Chaos Engineering Report

          | Metric | Value |
          |--------|-------|
          | **Status** | <STATUS> |
          | **Target** | <TARGET> |
          | **Executed** | <EXECUTED> |
          | **Skipped** | <SKIPPED> |
          | **Avg 5xx** | <FIVEX>% |
          | **Auto-rollback** | <ROLLBACK> |

          ### Per-Scenario Results

          ```
          <SCENARIOS>
          ```

          ### Raw Report

          ```json
          <REPORT>
          ```
          SUM_EOF
          sed -i "s|<STATUS>|${STATUS}|g; s|<TARGET>|${STAGING_URL}|g; s|<EXECUTED>|${EXECUTED}|g; s|<SKIPPED>|${SKIPPED}|g; s|<FIVEX>|${FIVEX}|g; s|<ROLLBACK>|${ROLLBACK}|g; s|<SCENARIOS>|${SCENARIOS}|g; s|<REPORT>|${REPORT}|g" $GITHUB_STEP_SUMMARY

      - name: Check results and create issue if failures detected
        id: check-results
        if: ${{ always() && steps.run-experiment.outputs.status != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT=$(cat /tmp/chaos-report.json 2>/dev/null || echo '{}')
          STATUS=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo 'unknown')
          FIVEX=$(echo "${REPORT}" | python3 -c "import sys,json;print(json.load(sys.stdin).get('overall_five_xx_pct',0))" 2>/dev/null || echo '0')
          if [ "${STATUS}" != "pass" ]; then
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            SCENARIOS_DETAIL=$(echo "${REPORT}" | python3 /tmp/format_issue_detail.py 2>/dev/null || echo '(no scenario data)')
            gh issue create \
              --title "Chaos Experiment FAILED - ${TIMESTAMP} (status: ${STATUS})" \
              --label "chaos-engineering,p1,incident" \
              --body "## Chaos Experiment Failure Report
          **Timestamp:** ${TIMESTAMP}
          **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Target:** ${STAGING_URL}
          **Status:** ${STATUS}
          **Overall 5xx:** ${FIVEX}%

          ### Failed Scenarios

          ${SCENARIOS_DETAIL}

          ### Required Actions

          1. Investigate each failed scenario - see workflow logs for detail
          2. Check if degradation was graceful (expected) or crash (regression)
          3. Verify auto-rollback worked correctly
          4. Update system if resilience gap identified
          5. Re-run experiment after fix with: gh workflow run chaos-engineering.yml

          ### Raw Report

          ${REPORT}" || echo "Failed to create issue (non-critical)"
            echo "issue_created=true" >> $GITHUB_OUTPUT
            echo "Issue created for failed chaos experiment"
          else
            echo "All scenarios passed - no issue needed"
            echo "issue_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-experiment-report
          path: /tmp/chaos-report.json
          retention-days: 30

      - name: Fail workflow if experiment failed
        if: ${{ steps.run-experiment.outputs.status != 'pass' && steps.run-experiment.outputs.status != '' }}
        run: |
          echo "::error::Chaos experiment failed (status: ${{ steps.run-experiment.outputs.status }})"
          echo "Investigation issue created. Check logs for details."
          exit 1
