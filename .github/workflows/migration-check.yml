name: "Migration Check (Post-Merge Alert)"

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC — catch unapplied migrations even without pushes
    - cron: '0 6 * * *'
    # Daily at 03:00 UTC — STORY-414 AC3: schema contract drift detection
    - cron: '0 3 * * *'
  # NOTE: PR checks moved to migration-gate.yml (CRIT-050) — warns instead of blocking

permissions:
  contents: read

concurrency:
  group: migration-check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  check-migrations:
    name: Check Unapplied Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for unapplied migrations
        run: |
          echo "Checking migration status..."
          OUTPUT=$(supabase migration list --linked 2>&1)
          echo "$OUTPUT"

          # Detect unapplied migrations: rows with Local value but empty Remote.
          # Supabase CLI outputs table with "Local | Remote | Time" columns.
          #
          # NOTE (CONV-003c Abstract Coral session): recent Supabase CLI versions
          # emit a DUAL-ROW per applied migration — the first row has both Local
          # and Remote populated (truly applied), and a spurious second row has
          # Local populated but Remote empty. A single-pass scan misclassifies
          # the second row as "unapplied" and raises a false positive.
          #
          # The 2-pass scan below marks a migration as applied if ANY row for
          # that Local value has a non-empty Remote. Truly unapplied migrations
          # are those whose ALL rows have empty Remote.
          UNAPPLIED=$(echo "$OUTPUT" | awk -F'|' '
            NR > 2 {
              local = $1; gsub(/^[ \t]+|[ \t]+$/, "", local)
              remote = $2; gsub(/^[ \t]+|[ \t]+$/, "", remote)
              if (local == "") next
              # Filter out stderr leakage (e.g. "Connecting to remote database...",
              # "Skipping migration README.md...") that lack pipe separators —
              # real migration rows always have a 14-digit timestamp in Local.
              if (local !~ /^[0-9]{14}$/) next
              seen[local] = 1
              if (remote != "") applied[local] = 1
            }
            END {
              for (m in seen) {
                if (!applied[m]) print m
              }
            }
          ' | sort)

          # Also check for explicit "Not applied" text (older CLI versions)
          if [ -n "$UNAPPLIED" ] || echo "$OUTPUT" | grep -q "Not applied"; then
            echo ""
            echo "::error::Found unapplied migrations!"
            if [ -n "$UNAPPLIED" ]; then
              echo "Unapplied migrations:"
              echo "$UNAPPLIED"
            fi
            echo ""
            echo "To fix this:"
            echo "  1. export SUPABASE_ACCESS_TOKEN=<your-token>"
            echo "  2. supabase link --project-ref <project-ref>"
            echo "  3. supabase db push --include-all"
            echo ""
            echo "This check prevents CRIT-039/CRIT-045 recurrence."
            exit 1
          fi

          echo "All migrations are applied to production."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # STORY-414 AC3: Validate schema contract after confirming migrations are applied.
      # Exits 1 if critical columns are missing — prevents drift from reaching prod silently.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Supabase Python client + schema deps
        # email-validator is needed because backend/schemas/__init__.py imports
        # user.py which uses pydantic.EmailStr. Without it, schemas.contract
        # fails at import time with ModuleNotFoundError before --validate runs.
        run: pip install supabase 'pydantic[email]' --quiet

      - name: Validate schema contract
        id: schema_contract
        # Must run from backend/ so that ``python -m schemas.contract`` can
        # resolve the ``schemas`` top-level module. The package's own
        # ``backend/schemas/__init__.py`` uses absolute ``from schemas.X``
        # imports (DEBT-302 consolidation) that only work with backend/
        # on PYTHONPATH. Running ``python -m backend.schemas.contract``
        # from the repo root raises ModuleNotFoundError: No module named
        # 'schemas' during package init, before --validate is ever parsed.
        working-directory: backend
        run: |
          set +e
          python -m schemas.contract --validate 2>&1 | tee /tmp/schema_contract_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          cat /tmp/schema_contract_output.txt

          if [ "$EXIT_CODE" -eq 1 ]; then
            # Extract missing column names for GITHUB_OUTPUT (comma-separated)
            MISSING=$(grep "^  - " /tmp/schema_contract_output.txt \
              | sed 's/^  - //' | tr '\n' ',' | sed 's/,$//')
            echo "has_violations=true" >> "$GITHUB_OUTPUT"
            echo "missing=${MISSING}" >> "$GITHUB_OUTPUT"
            echo "::error::SCHEMA CONTRACT VIOLATED — missing: ${MISSING}"
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Schema contract check skipped (config error — check SUPABASE secrets)."
            # Config errors are non-fatal: missing secrets in forks/dependabot
            EXIT_CODE=0
          else
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
          fi

          exit $EXIT_CODE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
