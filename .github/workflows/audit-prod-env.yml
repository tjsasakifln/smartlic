name: "Audit Railway prod env vars (RES-BE-013)"

# Operationalises memory `feedback_audit_env_vars_after_incident`: during the
# 2026-04-27 P0 Stage 2 we discovered ``PYTHONASYNCIODEBUG=1`` set on
# ``bidiq-backend`` prod with no commit/PR trail. This workflow audits the
# Railway environment against ``.github/audit/prod-env-blocklist.txt`` (hard
# fail) and ``prod-env-allowlist.txt`` (advisory warning).
#
# Triggers:
#   - PRs touching the audit lists/scripts/workflow → smoke-test the script
#     before any change to the lists ships.
#   - Daily cron 14:00 UTC (11h BRT) → drift detection independent of PRs.
#   - Manual dispatch → on-demand verification post-deploy.
#
# Notes:
#   - This is NOT a hard deploy gate. We chose advisory + Sentry alerting over
#     blocking deploy.yml because emergency env var changes (incident response)
#     must not be gated by lint. Blockers go through Sentry pager + Slack.
#   - Script is pure stdlib Python; no install step required.

on:
  pull_request:
    paths:
      - '.github/audit/**'
      - '.github/scripts/audit_prod_env.py'
      - '.github/scripts/test_audit_prod_env.py'
      - '.github/workflows/audit-prod-env.yml'
  schedule:
    # 14:00 UTC = 11:00 BRT, well after morning deploys settle.
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      service:
        description: 'Railway service to audit'
        required: false
        default: 'bidiq-backend'
        type: choice
        options:
          - bidiq-backend
          - bidiq-frontend

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: audit-prod-env-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Script unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run audit script tests
        working-directory: .github/scripts
        run: python3 test_audit_prod_env.py -v

  audit-backend:
    name: Audit bidiq-backend env vars
    needs: unit-tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"
      - name: Run audit
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set +e
          python3 .github/scripts/audit_prod_env.py \
            --service "${{ inputs.service || 'bidiq-backend' }}" \
            --json \
            > /tmp/audit-backend.json
          STATUS=$?
          cat /tmp/audit-backend.json
          exit $STATUS

  audit-frontend:
    name: Audit bidiq-frontend env vars
    needs: unit-tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"
      - name: Run audit
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set +e
          python3 .github/scripts/audit_prod_env.py \
            --service bidiq-frontend \
            --json \
            > /tmp/audit-frontend.json
          STATUS=$?
          cat /tmp/audit-frontend.json
          exit $STATUS
