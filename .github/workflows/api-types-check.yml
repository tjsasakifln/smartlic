# STORY-2.1 (EPIC-TD-2026Q2) — Pydantic → TypeScript type sync gate.
#
# Purpose: Prevent schema drift between backend Pydantic models and frontend
# TypeScript types. On every PR touching backend schemas/routes, we extract
# the OpenAPI schema directly from FastAPI, regenerate TypeScript types with
# openapi-typescript, and:
#
#   - On PRs: auto-commit the regenerated types to the PR branch (shift-left).
#   - On push to main: fail if committed types are stale (safety net).
#
# The auto-commit eliminates the #1 cause of CI failures (devs forgetting to
# run `npm --prefix frontend run generate:api-types` after schema changes).

name: "API Types Check"

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/schemas/**'
      - 'backend/routes/**'
      - 'backend/main.py'
      - 'backend/startup/**'
      - 'frontend/app/api-types.generated.ts'
      - 'scripts/generate-api-types.sh'
      - '.github/workflows/api-types-check.yml'
  push:
    branches: [main]
    paths:
      - 'backend/schemas/**'
      - 'backend/routes/**'
      - 'backend/main.py'
      - 'backend/startup/**'
      - 'frontend/app/api-types.generated.ts'
      - 'scripts/generate-api-types.sh'
      - '.github/workflows/api-types-check.yml'

permissions:
  contents: write  # Required for auto-commit on PR branches

concurrency:
  group: api-types-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  api-types-check:
    name: Verify frontend types match backend OpenAPI schema
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: sk-test-key
      ENCRYPTION_KEY: bzc732A921Puw9JN4lrzMo1nw0EjlcUdAyR6Z6N7Sqc=
      ENVIRONMENT: test
      SENTRY_DSN: ""
      REDIS_URL: ""
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code (full depth for auto-commit)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Extract OpenAPI schema from FastAPI (no backend server required)
        run: |
          cd backend
          python -c "
          import json
          from main import app
          app.openapi_schema = None
          schema = app.openapi()
          with open('/tmp/openapi.json', 'w') as f:
              json.dump(schema, f, indent=2, sort_keys=True)
          print(f'OpenAPI schema extracted: {len(schema.get(\"paths\", {}))} paths, {len(schema.get(\"components\", {}).get(\"schemas\", {}))} schemas')
          "
          ls -la /tmp/openapi.json

      - name: Regenerate TypeScript types
        run: |
          cd frontend
          npx openapi-typescript /tmp/openapi.json \
            --output /tmp/api-types.generated.new.ts
          echo "Generated /tmp/api-types.generated.new.ts ($(wc -l < /tmp/api-types.generated.new.ts) lines)"

      - name: Check for drift
        id: drift
        run: |
          if diff -u \
              frontend/app/api-types.generated.ts \
              /tmp/api-types.generated.new.ts \
              > /tmp/diff.out; then
            echo "drift=false" >> $GITHUB_OUTPUT
            echo "✅ frontend/app/api-types.generated.ts is in sync with backend schemas"
          else
            echo "drift=true" >> $GITHUB_OUTPUT
            echo "Drift detected (first 50 lines):"
            head -50 /tmp/diff.out
          fi

      - name: Auto-commit regenerated types (PR only)
        if: steps.drift.outputs.drift == 'true' && github.event_name == 'pull_request'
        run: |
          cp /tmp/api-types.generated.new.ts frontend/app/api-types.generated.ts

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add frontend/app/api-types.generated.ts
          git commit -m "chore: auto-regenerate api-types.generated.ts" || {
            echo "⚠️ No changes to commit (already in sync)"
            exit 0
          }

          git pull --rebase origin ${{ github.head_ref }} || {
            echo "⚠️ Rebase failed — pushing anyway"
          }
          git push origin HEAD:${{ github.head_ref }}
          echo "✅ Auto-committed regenerated api-types.generated.ts to ${{ github.head_ref }}"

      - name: Fail on main push drift (safety net)
        if: steps.drift.outputs.drift == 'true' && github.event_name == 'push'
        run: |
          echo "::error title=API types drift on main::frontend/app/api-types.generated.ts is out of sync on main. This should never happen — PR auto-commit should have prevented it."
          echo ""
          echo "Full diff:"
          cat /tmp/diff.out
          exit 1

      - name: TypeScript compile check
        if: always() && steps.drift.outputs.drift != 'cancelled'
        run: |
          cd frontend
          npx tsc --noEmit --pretty
          echo "✅ frontend/ compiles with committed generated types"
