# #1915: Monthly secret age check — alert when secrets exceed 90d rotation window.
#
# Runs on the 1st of every month (07:00 UTC) and on manual dispatch.
# Reads .secrets-backup/last-rotation.json and compares each secret's timestamp
# against MAX_AGE_DAYS (90). Creates a GitHub issue if any secret is overdue.
#
# Permissions:
#   issues: write  — to create alert issues when secrets are expired
#   contents: read — to checkout the repository

name: "Secret Age Check (#1915)"

on:
  schedule:
    # 1st day of month, 07:00 UTC = 04:00 BRT
    - cron: '0 7 1 * *'
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Max age in days before alerting'
        required: false
        default: '90'
        type: string
      create_issue:
        description: 'Create GitHub issue when expired secrets found'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  issues: write

concurrency:
  group: secret-age-check-${{ github.ref }}
  cancel-in-progress: true

env:
  MAX_AGE_DAYS: ${{ inputs.max_age_days || '90' }}
  TRACKER_PATH: .secrets-backup/last-rotation.json

jobs:
  check-secret-age:
    name: Check Secret Age
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      expired_count: ${{ steps.check.outputs.expired_count }}
      expired_list: ${{ steps.check.outputs.expired_list }}
      status: ${{ steps.check.outputs.status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .secrets-backup/last-rotation.json

      - name: Verify tracker file exists
        id: verify
        run: |
          if [ ! -f "$TRACKER_PATH" ]; then
            echo "::error title=Tracker not found::${TRACKER_PATH} does not exist"
            echo "Run './scripts/rotate-secrets.sh --dry-run <secret>' to initialize."
            echo "status=missing" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=found" >> "$GITHUB_OUTPUT"
          echo "Tracker file found: ${TRACKER_PATH}"

      - name: Check secret ages
        id: check
        run: |
          now_epoch=$(date +%s)
          expired_count=0
          expired_list=""
          total=0

          echo "::group::Secret Age Report"
          printf "%-45s %-22s %s\n" "SECRET" "LAST ROTATION" "AGE"
          printf "%s\n" "$(printf '=%.0s' {1..85})"

          while IFS= read -r line; do
            key=$(echo "$line" | jq -r '.key')
            val=$(echo "$line" | jq -r '.value')

            # Skip metadata keys
            case "$key" in
              _*) continue ;;
            esac

            ts_epoch=$(date -d "$val" +%s 2>/dev/null || echo "0")
            age_days=$(( (now_epoch - ts_epoch) / 86400 ))
            total=$((total + 1))

            if [ "$age_days" -gt "$MAX_AGE_DAYS" ]; then
              expired_count=$((expired_count + 1))
              expired_list="${expired_list}\n  - ${key}: ${age_days}d (last: ${val})"
              printf "\033[0;31m%-45s %-22s %dd [EXPIRED]\033[0m\n" "$key" "${val:0:19}" "$age_days"
            elif [ "$age_days" -gt $(( (MAX_AGE_DAYS * 3) / 4 )) ]; then
              printf "\033[0;33m%-45s %-22s %dd [WARN]\033[0m\n" "$key" "${val:0:19}" "$age_days"
            else
              printf "\033[0;32m%-45s %-22s %dd [OK]\033[0m\n" "$key" "${val:0:19}" "$age_days"
            fi
          done < <(jq -c 'to_entries[]' "$TRACKER_PATH")

          echo "::endgroup::"

          # Summary
          echo ""
          echo "Total secrets: ${total}"
          echo "Expired (>${MAX_AGE_DAYS}d): ${expired_count}"

          if [ "$expired_count" -gt 0 ]; then
            echo "status=expired" >> "$GITHUB_OUTPUT"
            echo "::warning title=Secrets expired::${expired_count} secret(s) exceed ${MAX_AGE_DAYS}d rotation window"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "::notice title=Secrets OK::All ${total} secrets within ${MAX_AGE_DAYS}d window"
          fi

          echo "expired_count=${expired_count}" >> "$GITHUB_OUTPUT"
          echo "expired_list=${expired_list}" >> "$GITHUB_OUTPUT"

      - name: Create issue if secrets expired
        if: steps.check.outputs.status == 'expired' && (github.event_name == 'schedule' || inputs.create_issue == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const expiredCount = '${{ steps.check.outputs.expired_count }}';
            const expiredList = '${{ steps.check.outputs.expired_list }}';
            const runUrl = `${context.serverUrl}/${context.repo}/actions/runs/${context.runId}`;

            const title = `[Secret Rotation] ${expiredCount} secret(s) expired — rotate within 7 days`;
            const body = `## Secrets Rotation Required

            **${expiredCount} secret(s)** have exceeded the ${process.env.MAX_AGE_DAYS}-day rotation window.

            ### Expired Secrets
            ${expiredList.replace(/\\n/g, '\n')}

            ### Required Action
            1. Rotate each expired secret within **7 days**
            2. Use \`./scripts/rotate-secrets.sh <SECRET>\` for automation
            3. Verify with \`./scripts/rotate-secrets.sh --check\`
            4. See \`docs/operations/secrets-rotation.md\` for full procedure

            ### Automation Run
            - Workflow: [${context.runId}](${runUrl})
            - Date: ${new Date().toISOString()}

            ### Priority
            | Severity | Action |
            |----------|--------|
            | CRITICAL | Rotate immediately (STRIPE_SECRET_KEY, SUPABASE_SERVICE_ROLE_KEY, etc.) |
            | HIGH | Rotate within 24h (OPENAI_API_KEY, GITHUB_TOKEN, etc.) |
            | MEDIUM | Rotate within 7d (RESEND_API_KEY, SENTRY_AUTH_TOKEN, etc.) |

            ### How to Rotate
            \`\`\`bash
            # Check all ages
            ./scripts/rotate-secrets.sh --check

            # Rotate a specific secret (auto-generatable)
            ./scripts/rotate-secrets.sh REVALIDATE_SECRET

            # Rotate manually (provide value from provider dashboard)
            ./scripts/rotate-secrets.sh OPENAI_API_KEY --value="sk-..."

            # Verify after rotation
            ./scripts/rotate-secrets.sh --check
            \`\`\`

            ---
            *This issue was automatically created by the Secret Age Check workflow (#1915).*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'secret-rotation', 'automated'],
            });

            console.log(`Issue created: ${title}`);
