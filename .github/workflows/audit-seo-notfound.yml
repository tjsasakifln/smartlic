name: "Audit SEO notFound (ADR-SEO-001)"

# Operationalises ADR-SEO-001 (`docs/adr/ADR-SEO-001-programmatic-routes-no-notfound-on-data-gap.md`):
# programmatic SEO routes (18 path prefixes, ~10k URLs) MUST NOT call
# `notFound()` on empty data or transient fetch failure. ISR caches
# `notFound()` for up to 24h with no auto-recovery — Googlebot drops the
# URL and de-indexation cascades to siblings.
#
# Allow path: lines that legitimately need `notFound()` (malformed slug,
# unknown catalog entry) carry the marker `// adr-seo-001-allow: <reason>`
# on the same line OR on the immediately preceding line.
#
# The gate fails the PR for any unmarked occurrence and posts a sticky
# comment linking to the ADR. PR-only trigger with `paths:` filter so the
# gate stays cheap and never fires on unrelated PRs.

on:
  pull_request:
    paths:
      - 'frontend/app/observatorio/**'
      - 'frontend/app/cnpj/**'
      - 'frontend/app/fornecedores/**'
      - 'frontend/app/orgaos/**'
      - 'frontend/app/municipios/**'
      - 'frontend/app/licitacoes/**'
      - 'frontend/app/contratos/**'
      - 'frontend/app/alertas-publicos/**'
      - 'frontend/app/itens/**'
      - 'frontend/app/blog/**'
      - 'frontend/app/casos/**'
      - 'frontend/app/glossario/**'
      - 'frontend/app/guia/**'
      - 'frontend/app/masterclass/**'
      - 'frontend/app/perguntas/**'
      - 'frontend/app/compliance/**'
      - 'frontend/app/indice-municipal/**'
      - 'frontend/app/analise/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: audit-seo-notfound-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit notFound() in protected SEO routes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run standalone audit script
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT=$(bash .github/scripts/audit-seo-notfound.sh 2>&1) || true
          echo "$OUTPUT"

          # Parse output for CI summary
          if echo "$OUTPUT" | grep -q "^violations_found=true"; then
            echo "violations_found=true" >> "$GITHUB_OUTPUT"
            COUNT=$(echo "$OUTPUT" | grep "^violation_count=" | cut -d= -f2)
            echo "violation_count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "::error::Found $COUNT unmarked notFound() call(s) in protected SEO routes."

            # Annotate each violation line in the GitHub UI
            while IFS= read -r line; do
              case "$line" in
                VIOLATION:*)
                  vfile="${line#VIOLATION: }"
                  vfile="${vfile%%:*}"
                  vrest="${line#*: }"
                  vlineno="${vrest%%:*}"
                  echo "::error file=${vfile},line=${vlineno}::Unmarked notFound() in protected SEO route. See ADR-SEO-001 for the allowed-marker convention."
                  ;;
              esac
            done <<< "$OUTPUT"
          else
            echo "violations_found=false" >> "$GITHUB_OUTPUT"
            echo "violation_count=0" >> "$GITHUB_OUTPUT"
          fi

          # Only fail after all output is fully captured and posted
          if echo "$OUTPUT" | grep -q "^violations_found=true"; then
            exit 1
          fi

      - name: Post / update sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          VIOLATIONS_FOUND: ${{ steps.scan.outputs.violations_found }}
          VIOLATION_COUNT: ${{ steps.scan.outputs.violation_count }}
        with:
          script: |
            const fs = require('fs');
            const violationsFound = process.env.VIOLATIONS_FOUND === 'true';
            const count = process.env.VIOLATION_COUNT || '0';
            const marker = '<!-- audit-seo-notfound-sticky -->';

            const adrLink =
              'https://github.com/' + context.repo.owner + '/' + context.repo.repo +
              '/blob/main/docs/adr/ADR-SEO-001-programmatic-routes-no-notfound-on-data-gap.md';

            let body;
            if (violationsFound) {
              let detail = '';
              try {
                detail = fs.readFileSync('/tmp/seo_notfound_violations.txt', 'utf8').trim();
              } catch (_) {
                detail = '(violation list unavailable)';
              }
              body =
                marker + '\n' +
                '## SEO notFound() audit — FAIL (' + count + ' violation' + (count === '1' ? '' : 's') + ')\n\n' +
                'One or more protected programmatic SEO routes call `notFound()` ' +
                'without the `// adr-seo-001-allow: <reason>` marker.\n\n' +
                'ISR caches `notFound()` for up to 24h with no auto-recovery — ' +
                'Googlebot drops the URL and de-indexation cascades to siblings. ' +
                'See [ADR-SEO-001](' + adrLink + ') for the full rationale.\n\n' +
                '### Violations\n\n' +
                '```\n' + detail + '\n```\n\n' +
                '### How to fix\n\n' +
                '- **Empty data on a known slug** → render `<EmptyStateSEO>` with ' +
                '`robots: \'noindex,follow\'`. Remove the `notFound()` call.\n' +
                '- **Transient fetch failure** → re-throw so ISR falls back to ' +
                'last-good. Remove the `notFound()` call.\n' +
                '- **Malformed slug / unknown catalog entry** → keep `notFound()` ' +
                'and add `// adr-seo-001-allow: <one-line reason>` on the same ' +
                'line or the line above.\n\n' +
                '> _Powered by ADR-SEO-001 — prevents SEN-FE-001 recidiva and ISR ' +
                '404-cache de-indexation cascades._';
            } else {
              body =
                marker + '\n' +
                '## SEO notFound() audit — PASS\n\n' +
                'No unmarked `notFound()` calls found in protected programmatic ' +
                'SEO routes. See [ADR-SEO-001](' + adrLink + ') for the rule.\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user && c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if violations
        if: steps.scan.outputs.violations_found == 'true'
        run: |
          echo "Failing gate due to ${{ steps.scan.outputs.violation_count }} unmarked notFound() call(s) in protected SEO routes."
          exit 1
