# CRIT-038 AC1: Backend test gate — zero failures required for merge
# DEBT-007: Added API schema validation, vulnerability scanning, linting
# THIS IS THE AUTHORITATIVE BACKEND PR GATE. Do not disable this workflow.
name: "Backend Tests (PR Gate)"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write  # Required for auto-commit of OpenAPI snapshot updates on PR branches

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: sk-test-key
      ENCRYPTION_KEY: bzc732A921Puw9JN4lrzMo1nw0EjlcUdAyR6Z6N7Sqc=
      ENVIRONMENT: test
      SENTRY_DSN: ""
      REDIS_URL: ""
      LOG_LEVEL: WARNING
      UPDATE_SNAPSHOTS: "1"  # Auto-regenerate OpenAPI snapshot on schema drift

    steps:
      - name: Checkout code (full depth for auto-commit)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx pytest-timeout
          pip install pip-audit ruff mypy

      # CI-002: Advisory security audit — shows detailed descriptions, non-blocking
      # Runs early so results are visible even if later steps fail.
      # The blocking pip-audit step (DEBT-123 AC1) runs after tests.
      - name: Security audit (advisory — detailed output)
        run: |
          cd backend
          pip-audit --strict --desc on -r requirements.txt 2>&1 || true
          echo "ℹ️ pip-audit advisory scan complete (non-blocking)"
        continue-on-error: true  # CI-002: intentional — advisory scan, blocking scan follows after tests

      - name: Run tests (exit code 0 required)
        # STORY-BTS-007 (2026-04-19, @po direction (a)): tests/integration/ moved to
        # backend-tests-external.yml (non-blocking) to preserve zero-failure policy
        # on the PR gate without depending on external infra availability.
        run: |
          cd backend
          pytest tests/ \
            -m "not benchmark and not external" \
            --ignore=tests/fuzz \
            --ignore=tests/integration \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=71 \
            --junitxml=pytest-report.xml \
            -v
          echo "✅ All backend tests passed with coverage ≥ 71%"

      # STORY-6.7: Property-based fuzz tests (Hypothesis) — separate step to isolate timing
      - name: Run fuzz tests (Hypothesis)
        run: |
          cd backend
          pip install "hypothesis>=6.92.0" -q
          pytest tests/fuzz/ -q --timeout=60 -m fuzz
          echo "✅ Fuzz tests passed"

      # DEBT-111 AC5: Per-module coverage thresholds
      - name: Check per-module coverage thresholds
        if: success()
        run: |
          cd backend
          python scripts/check_module_coverage.py
          echo "✅ Per-module coverage thresholds passed"

      # DEBT-007 CROSS-002: API contract snapshot — auto-updated via pytest
      # (inline check removed; test_openapi_schema_matches_snapshot handles this
      # with UPDATE_SNAPSHOTS=1 env var set on the pytest run above)

      # DEBT-123 AC1: Vulnerability scanning — BLOCKING (security-critical)
      # PYSEC-2026-161: starlette<1.0.1 — pre-existing, not fixable without
      # FastAPI major upgrade (starlette is a FastAPI dep). Tracked separately.
      - name: Vulnerability scan (pip-audit)
        run: |
          cd backend
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-161
          echo "✅ pip-audit: no known vulnerabilities (PYSEC-2026-161 ignored — tracked separately)"

      # DEBT-123 AC9: Linting — intentionally non-blocking (advisory, not security)
      - name: Lint (ruff check)
        run: |
          cd backend
          ruff check . --output-format=github 2>&1 | head -50
          echo "ℹ️ Ruff lint complete (non-blocking)"
        continue-on-error: true  # DEBT-123 AC9: intentional — linting is advisory, not security-critical

      # DEBT-123 AC9: Type checking — intentionally non-blocking (advisory, not security)
      - name: Type check (mypy)
        run: |
          cd backend
          mypy . --ignore-missing-imports --check-untyped-defs 2>&1 | tail -20
          echo "ℹ️ Mypy type check complete (non-blocking)"
        continue-on-error: true  # DEBT-123 AC9: intentional — type checking is advisory, not security-critical

      # Auto-commit regenerated OpenAPI snapshot (PR only).
      # UPDATE_SNAPSHOTS=1 above ensures test_openapi_schema_matches_snapshot
      # regenerates the snapshot when schema drifts. This step commits the result.
      - name: Auto-commit OpenAPI snapshot (PR only)
        if: github.event_name == 'pull_request' && success()
        run: |
          cd backend
          # Clean up stale diff file if present
          rm -f tests/snapshots/openapi_schema.diff.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet tests/snapshots/openapi_schema.json; then
            echo "✅ OpenAPI snapshot unchanged — nothing to commit"
            exit 0
          fi

          git add tests/snapshots/openapi_schema.json
          git commit -m "chore: auto-regenerate OpenAPI snapshot" || {
            echo "⚠️ No changes to commit"
            exit 0
          }

          # Pull to avoid race with other auto-commit workflows (e.g. api-types-check)
          git pull --rebase origin ${{ github.head_ref }} || {
            echo "⚠️ Rebase failed — pushing anyway"
          }
          git push origin HEAD:${{ github.head_ref }}
          echo "✅ Auto-committed regenerated OpenAPI snapshot to ${{ github.head_ref }}"
