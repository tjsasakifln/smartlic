name: "Migration Gate (PR Warning — Non-Blocking)"

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: migration-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  warn-pending-migrations:
    name: Check Pending Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: List and compare migrations
        id: check
        run: |
          echo "=== Checking migration status ==="
          OUTPUT=$(supabase migration list --linked 2>&1)
          echo "$OUTPUT"

          # Parse unapplied migrations: rows with Local value but empty Remote
          UNAPPLIED=$(echo "$OUTPUT" | awk -F'|' '
            NR > 2 {
              local = $1; gsub(/^[ \t]+|[ \t]+$/, "", local)
              remote = $2; gsub(/^[ \t]+|[ \t]+$/, "", remote)
              if (local != "" && remote == "") print local
            }
          ')

          # Also check for explicit "Not applied" text (older CLI versions)
          if echo "$OUTPUT" | grep -q "Not applied"; then
            LEGACY_UNAPPLIED=$(echo "$OUTPUT" | grep "Not applied" | awk '{print $1}')
            UNAPPLIED=$(printf "%s\n%s" "$UNAPPLIED" "$LEGACY_UNAPPLIED" | sort -u | sed '/^$/d')
          fi

          COUNT=$(echo "$UNAPPLIED" | sed '/^$/d' | wc -l)

          if [ "$COUNT" -gt 0 ]; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            # Save list for comment step
            echo "$UNAPPLIED" > /tmp/unapplied_migrations.txt

            echo ""
            echo "::warning::Found $COUNT unapplied migration(s) in production."
            echo "These will be auto-applied by the deploy workflow after merge."
            echo ""
            echo "Unapplied migrations:"
            echo "$UNAPPLIED"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            echo "All migrations are applied to production."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # STORY-6.2 AC3: Enforce down.sql pairing — BLOCKS merge if missing
      - name: Check down.sql pairing
        id: down_sql
        run: |
          echo "=== Checking down.sql pairing for new migrations ==="
          MISSING=()
          for up in $(git diff --name-only --diff-filter=A origin/main...HEAD \
                | grep '^supabase/migrations/.*\.sql$' \
                | grep -v '\.down\.sql$' \
                | grep -v 'supabase/migrations/README\.md'); do
            base="${up%.sql}"
            if [ ! -f "${base}.down.sql" ]; then
              echo "::error file=${up}::Migration ${up} is missing ${base}.down.sql"
              MISSING+=("${up}")
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "down_sql_missing=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${MISSING[@]}" > /tmp/missing_down_sql.txt
            echo ""
            echo "Missing down.sql files:"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          else
            echo "down_sql_missing=false" >> "$GITHUB_OUTPUT"
            echo "All new migrations have paired down.sql files."
          fi

      # STORY-414 AC3: Validate schema contract on every PR (warns, does not block merge)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Supabase Python client
        run: pip install supabase --quiet

      - name: Check schema contract
        id: schema
        run: |
          set +e
          python -m backend.schemas.contract --validate 2>&1 | tee /tmp/schema_out.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT_CODE" -eq 1 ]; then
            MISSING=$(grep "^  - " /tmp/schema_out.txt \
              | sed 's/^  - //' | tr '\n' ',' | sed 's/,$//')
            echo "has_violations=true" >> "$GITHUB_OUTPUT"
            echo "missing=${MISSING}" >> "$GITHUB_OUTPUT"
            echo "::warning::Schema contract violations detected: ${MISSING}"
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Schema contract check skipped (config — SUPABASE secrets not available)."
          else
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
          fi
          # Always exit 0 — gate is informational on PRs (migration-check.yml blocks on push)
          exit 0
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Post PR comment
        if: steps.check.outputs.has_pending == 'true' || steps.schema.outputs.has_violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const hasMigrations = '${{ steps.check.outputs.has_pending }}' === 'true';
            const hasSchemaViolations = '${{ steps.schema.outputs.has_violations }}' === 'true';
            const count = '${{ steps.check.outputs.count }}';
            const missingColumns = '${{ steps.schema.outputs.missing }}';
            const sections = [];

            if (hasMigrations) {
              const unapplied = fs.readFileSync('/tmp/unapplied_migrations.txt', 'utf8').trim();
              sections.push(
                '## \u26a0\ufe0f Migration Gate \u2014 ' + count + ' Pending Migration(s)\n\n' +
                'The following migration(s) exist locally but are **not yet applied** to production:\n\n' +
                '```\n' + unapplied + '\n```\n\n' +
                '**This is a warning, not a blocker.** The deploy workflow will auto-apply these ' +
                'migrations via `supabase db push --include-all` after the backend deploys.\n\n' +
                '### What to verify before merging:\n' +
                '- [ ] Migration SQL is idempotent or safe to apply\n' +
                '- [ ] No destructive operations (DROP TABLE, DROP COLUMN) without review\n' +
                '- [ ] Backend code handles the schema transition gracefully'
              );
            }

            if (hasSchemaViolations) {
              const cols = missingColumns.split(',')
                .map(c => '  - `' + c.trim() + '`').join('\n');
              sections.push(
                '## \ud83d\udd34 Schema Contract Violations Detected (STORY-414)\n\n' +
                'The following critical columns are **missing from the database schema**:\n\n' +
                cols + '\n\n' +
                'These columns are required by `backend/schemas/contract.py` for the application ' +
                'to function correctly.\n' +
                'Apply the relevant migrations before merging to prevent a production incident.\n\n' +
                '> _Detected by STORY-414 schema contract gate._'
              );
            }

            const body = sections.join('\n\n---\n\n') +
              '\n\n> _Powered by CRIT-050 migration gate \u2014 prevents CRIT-039/CRIT-045 recurrence._';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Migration Gate') && c.user.type === 'Bot'
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
