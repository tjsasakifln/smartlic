# =============================================================================
# Security Scan — OWASP ZAP Baseline
# =============================================================================
# #1955: P0 Penetration test — weekly ZAP baseline scan against production.
# Non-blocking (continue-on-error: true) — findings are collected as artifacts
# for manual triage, not as a hard CI gate.
#
# Triggers:
#   - schedule: Sundays at 03:00 UTC (low-traffic window)
#   - workflow_dispatch: on-demand from GitHub UI
#
# Notes:
#   - Uses OWASP ZAP in baseline mode (passive scan + spider, no active attacks)
#   - Safe for production targets — no payload injection or fuzzing
#   - Reports are uploaded as artifacts for 30-day retention
#   - HIGH/CRITICAL findings DO NOT block the workflow (advisory only)
# =============================================================================

name: "Security Scan (ZAP Baseline)"

on:
  schedule:
    # Every Sunday at 03:00 UTC = 00:00 BRT
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL to scan'
        required: false
        default: 'https://smartlic.tech'
        type: string
      mode:
        description: 'Scan mode'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - api

permissions:
  contents: read
  actions: write  # Required to upload artifacts

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────
  # OWASP ZAP Baseline Scan
  # ─────────────────────────────────────────────────
  zap-baseline:
    name: "OWASP ZAP Baseline Scan"
    runs-on: ubuntu-latest
    # Non-blocking: findings are advisory, not a hard gate
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ZAP Baseline Scan
        id: zap_scan
        env:
          TARGET: ${{ inputs.target || 'https://smartlic.tech' }}
        run: |
          chmod +x scripts/security/zap-baseline.sh
          bash scripts/security/zap-baseline.sh \
            --target="$TARGET" \
            --output="reports/security/zap-baseline-ci" \
            --timeout=600

      - name: Upload ZAP Report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-html
          path: reports/security/zap-baseline-ci/*.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload ZAP Report (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-json
          path: reports/security/zap-baseline-ci/*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload ZAP Report (Markdown Summary)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-summary
          path: reports/security/zap-baseline-ci/*.md
          retention-days: 30
          if-no-files-found: warn

      - name: Print Alert Summary
        if: always()
        run: |
          if ls reports/security/zap-baseline-ci/*.counts 1>/dev/null 2>&1; then
            cat reports/security/zap-baseline-ci/*.counts
          else
            echo "No alert counts file found — scan may have failed"
          fi

  # ─────────────────────────────────────────────────
  # Summary Gate (non-blocking)
  # ─────────────────────────────────────────────────
  security-scan-summary:
    name: "Security Scan Summary"
    runs-on: ubuntu-latest
    needs: [zap-baseline]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "================================================"
          echo "  Security Scan Completed"
          echo "  Trigger: ${{ github.event_name }}"
          echo "  Target:  ${{ inputs.target || 'https://smartlic.tech' }}"
          echo "  Status:  ${{ needs.zap-baseline.result }}"
          echo "================================================"
          echo ""
          echo "  This is a NON-BLOCKING advisory scan."
          echo "  Findings are advisory — no CI gate failure."
          echo ""
          echo "  To view reports:"
          echo "    - Download artifacts from workflow run"
          echo "    - HTML report in zap-report-html"
          echo "    - JSON report in zap-report-json"
          echo "    - Markdown summary in zap-report-summary"
          echo ""

  # ─────────────────────────────────────────────────
  # Security Headers Check (does not require Docker)
  # ─────────────────────────────────────────────────
  security-headers:
    name: "HTTP Security Headers Check"
    runs-on: ubuntu-latest
    # Non-blocking: advisory check
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run HTTP Security Headers Check
        env:
          TARGET: ${{ inputs.target || 'https://smartlic.tech' }}
        run: |
          mkdir -p reports/security/headers-ci
          echo "Checking security headers for $TARGET..."

          HEADERS=$(curl -sI --max-time 10 "$TARGET" 2>/dev/null || echo "ERROR: Failed to fetch headers")
          echo "$HEADERS" > reports/security/headers-ci/headers.txt

          # Check for essential security headers
          ESSENTIAL_HEADERS=(
            "Strict-Transport-Security"
            "X-Content-Type-Options"
            "X-Frame-Options"
            "Content-Security-Policy"
            "Referrer-Policy"
            "Permissions-Policy"
          )

          PASS=0
          FAIL=0

          for header in "${ESSENTIAL_HEADERS[@]}"; do
            if echo "$HEADERS" | grep -qi "^${header}:"; then
              echo "✅ $header: PRESENT"
              ((PASS++))
            else
              echo "❌ $header: MISSING"
              ((FAIL++))
            fi
          done

          echo ""
          echo "Headers check: $PASS present, $FAIL missing"
          echo "PASS=$PASS" > reports/security/headers-ci/result.env
          echo "FAIL=$FAIL" >> reports/security/headers-ci/result.env

          # Always exit 0 (non-blocking)
          exit 0

      - name: Upload Headers Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-headers-report
          path: reports/security/headers-ci/
          retention-days: 30
          if-no-files-found: warn
