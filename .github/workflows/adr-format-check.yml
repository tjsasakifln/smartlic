name: "ADR — Format & Index Check"

# Validates ADR format under docs/adr/ and enforces that docs/adr/README.md
# (the auto-generated index) is in sync with the ADR sources.
#
# Two stages:
#   1. validate_adr_format.py — WARN-ONLY (exits 0 in CI). Existing ADRs do
#      not all match the canonical format yet; format adherence will be
#      tightened in a follow-up after legacy ADR cleanup.
#   2. build_adr_index.py --check — HARD FAIL. README.md must be regenerated
#      and committed whenever ADR sources change. Drift here is non-controversial.

on:
  pull_request:
    paths:
      - 'docs/adr/**'
      - 'scripts/build_adr_index.py'
      - 'scripts/validate_adr_format.py'
      - '.github/workflows/adr-format-check.yml'
  push:
    branches: [main]
    paths:
      - 'docs/adr/**'
      - 'scripts/build_adr_index.py'
      - 'scripts/validate_adr_format.py'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adr-format-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adr-checks:
    name: ADR format + index drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate ADR format (warn-only)
        id: validate
        continue-on-error: true
        run: |
          python scripts/validate_adr_format.py --ci-warn-only | tee adr-format-report.txt
          echo "Validator exit: $?"

      - name: Annotate validator violations (warn-only)
        if: always()
        run: |
          if grep -q '^FAIL ' adr-format-report.txt 2>/dev/null; then
            echo "::warning title=ADR format violations::See adr-format-report.txt. Validator runs in warn-only mode; fix in follow-up PR."
          fi

      - name: Check ADR index drift (hard fail)
        run: |
          python scripts/build_adr_index.py --check
