name: Weekly Load Test — Stage 4-7 Pattern (OPS-RELIABILITY-002)

on:
  schedule:
    # Sun 08:00 UTC = Sun 05:00 BRT (low-traffic window)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target API URL'
        required: false
        default: 'https://api.smartlic.tech'
      users:
        description: 'Concurrent users'
        required: false
        default: '50'
      duration:
        description: 'Test duration (e.g., 10m)'
        required: false
        default: '10m'

permissions:
  contents: read
  pull-requests: write

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Locust
        run: pip install locust==2.32.0
      - name: Run Stage 4-7 reproducer
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://api.smartlic.tech' }}
          USERS: ${{ github.event.inputs.users || '50' }}
          DURATION: ${{ github.event.inputs.duration || '10m' }}
        run: |
          cd backend/tests/load
          locust -f stage_4_7_pattern.py \
            --host "$TARGET_URL" \
            --users "$USERS" \
            --spawn-rate 5 \
            --run-time "$DURATION" \
            --headless \
            --csv=load-test-results \
            --html=load-test-report.html \
            --exit-code-on-error 1
      - name: Parse, validate and summarise results
        id: validate
        working-directory: backend/tests/load
        run: |
          python3 <<'PYTHON_SCRIPT'
          import csv, json, os, sys

          P95_THRESHOLD_MS = 500
          ERROR_RATE_THRESHOLD_PCT = 1.0
          csv_path = "load-test-results_stats.csv"

          if not os.path.exists(csv_path):
              print("ERROR: No load test results found", file=sys.stderr)
              # Set output anyway so later steps don't crash
              with open(os.environ["GITHUB_OUTPUT"], "a") as fp:
                  fp.write("thresholds_met=false\n")
              sys.exit(1)

          print("=== LOAD TEST RESULTS SUMMARY ===")
          print()

          thresholds_met = True
          endpoints = []

          with open(csv_path) as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row.get("Type") == "Aggregated":
                      continue

                  name = row.get("Name", "?")
                  req_count = int(row.get("Request Count", 0))
                  fail_count = int(row.get("Failure Count", 0))
                  p95 = float(row.get("95%", 0))
                  avg = float(row.get("Average", 0))
                  rps = float(row.get("Requests/s", 0))
                  failure_rate = (fail_count / req_count * 100) if req_count > 0 else 0.0

                  print(f"  Endpoint: {name}")
                  print(f"    Requests: {req_count} | Failures: {fail_count} ({failure_rate:.2f}%)")
                  print(f"    P95: {p95:.0f}ms | Avg: {avg:.0f}ms | RPS: {rps:.1f}")

                  ex = ""
                  if p95 > P95_THRESHOLD_MS:
                      ex = f" -- P95 {p95:.0f}ms exceeds {P95_THRESHOLD_MS}ms"
                      thresholds_met = False
                  if failure_rate > ERROR_RATE_THRESHOLD_PCT:
                      ex += f" -- error rate {failure_rate:.2f}% exceeds {ERROR_RATE_THRESHOLD_PCT}%"
                      thresholds_met = False
                  if ex:
                      print(f"    [BREACH]{ex}")
                  print()

                  endpoints.append({
                      "name": name,
                      "requests": req_count,
                      "failures": fail_count,
                      "failure_rate_pct": round(failure_rate, 2),
                      "p95_ms": round(p95, 0),
                      "avg_ms": round(avg, 0),
                      "rps": round(rps, 1),
                  })

          print("=== THRESHOLD CHECK ===")
          if thresholds_met:
              print(f"All thresholds passed (P95 < {P95_THRESHOLD_MS}ms, error rate < {ERROR_RATE_THRESHOLD_PCT}%)")
          else:
              print(f"Some thresholds exceeded — review results above")
              print(f"  P95 limit: {P95_THRESHOLD_MS}ms")
              print(f"  Error rate limit: {ERROR_RATE_THRESHOLD_PCT}%")

          # Write summary JSON
          summary = {
              "endpoints": endpoints,
              "thresholds": {
                  "p95_max_ms": P95_THRESHOLD_MS,
                  "error_rate_max_pct": ERROR_RATE_THRESHOLD_PCT,
              },
              "thresholds_met": thresholds_met,
          }
          with open("load-test-summary.json", "w") as fp:
              json.dump(summary, fp, indent=2)

          # Export GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as fp:
              fp.write(f"thresholds_met={'true' if thresholds_met else 'false'}\n")

          sys.exit(0 if thresholds_met else 1)
          PYTHON_SCRIPT

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: load-test-results-${{ github.run_id }}
          path: |
            backend/tests/load/load-test-results_*.csv
            backend/tests/load/load-test-report.html
            backend/tests/load/load-test-summary.json
          retention-days: 30

      - name: Comment on PR with results (manual dispatch only)
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summaryPath = 'backend/tests/load/load-test-summary.json';
            let message = '## Weekly Load Test Threshold Breach\n\n';

            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              message += '### Endpoint Performance\n\n';
              message += '| Endpoint | Requests | Failures | P95 (ms) | Avg (ms) | RPS |\n';
              message += '|----------|----------|----------|----------|----------|-----|\n';
              for (const ep of summary.endpoints) {
                const failureRate = ep.requests > 0
                  ? ((ep.failures / ep.requests) * 100).toFixed(2)
                  : '0.00';
                message += `| ${ep.name} | ${ep.requests} | ${ep.failures} (${failureRate}%) | ${ep.p95_ms} | ${ep.avg_ms} | ${ep.rps.toFixed(1)} |\n`;
              }
              message += '\n### Thresholds\n\n';
              message += `- P95 max: ${summary.thresholds.p95_max_ms}ms\n`;
              message += `- Error rate max: ${summary.thresholds.error_rate_max_pct}%\n\n`;
              message += 'Some thresholds were exceeded. Review the full report in artifacts.\n\n';
            } else {
              message += 'No load test results available.\n\n';
            }

            message += `[View artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            } catch (error) {
              console.log('Failed to post comment:', error.message);
            }

      - name: Sentry alert on failure
        if: failure()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_BACKEND }}
        run: |
          if [[ -n "$SENTRY_DSN" ]]; then
            pip install sentry-sdk==2.18.0
            python -c "
            import sentry_sdk, os
            sentry_sdk.init(dsn=os.environ['SENTRY_DSN'])
            sentry_sdk.capture_message(
              'Weekly load test failed - thresholds exceeded (OPS-RELIABILITY-002)',
              level='error'
            )
            "
          fi
