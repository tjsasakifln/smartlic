name: Load Test Weekly

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      vus:
        description: 'Virtual Users'
        required: false
        default: '10'
      duration:
        description: 'Test duration'
        required: false
        default: '2m'
      base_url:
        description: 'Target URL'
        required: false
        default: 'https://staging.smartlic.tech'

jobs:
  load-test:
    name: k6 Load Test (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: 'latest'

      - name: Run Load Test
        id: k6
        continue-on-error: true
        run: |
          k6 run \
            --duration ${{ inputs.duration || '2m' }} \
            --vus ${{ inputs.vus || '10' }} \
            --summary-export=results.json \
            tests/load/k6-search-load.js
        env:
          BASE_URL: ${{ inputs.base_url || 'https://staging.smartlic.tech' }}

      - name: Analyze Results
        if: always()
        run: |
          if [ -f results.json ]; then
            echo "## k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('results.json') as f:
              data = json.load(f)
          m = data.get('metrics', {})
          http_req = m.get('http_req_duration', {})
          vals = http_req.get('values', {})
          p95 = vals.get('p(95)', 0)
          err_rate = m.get('errors',{}).get('values',{}).get('rate', 0) * 100
          print(f'p95: {p95:.0f}ms | Error rate: {err_rate:.1f}%')
          if p95 > 3000 or err_rate > 10:
              print('FAIL')
              exit(1)
          print('PASS')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: results.json
          retention-days: 30
