# =============================================================================
# SmartLic - Backend Railway Configuration
# =============================================================================
# Service: smartlic-backend
# Framework: FastAPI + Python 3.12
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
# CRIT-083: uvicorn --workers (spawn-based) — SAFE with cryptography>=46.
# Research finding (CRIT-083-research-findings.md): Gunicorn uses os.fork() which
# corrupts OpenSSL state → SIGSEGV. uvicorn --workers uses multiprocessing.spawn()
# which creates clean processes with independent OpenSSL initialization.
# 2 workers on Railway 1GB: ~500-600MB total (each worker ~200-300MB) — workable.
# Cross-worker SSE: handled by Redis Streams (STORY-276, STORY-294).
# Graceful shutdown: --timeout-graceful-shutdown 120 aligned with drainingSeconds.
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --timeout-keep-alive 75 --workers ${WEB_CONCURRENCY:-2} --timeout-graceful-shutdown 120'"
# Stage-2 fix 2026-04-27: was /health (probes 5 external APIs with 10s each timeout).
# Under sustained Googlebot crawl, /health couldn't respond → 11 healthcheck retries
# failed → Railway never promoted new container, leaving old wedged one in service
# (deploys 14:00, 14:15 both got "1/1 replicas never became healthy"). /health/live
# is pure-async (no IO, just returns startup_time) — guaranteed-fast under any load.
healthcheckPath = "/health/live"
# SLA-001 + STORY-303 AC6: 300s grace period for cold starts.
# Without --preload (STORY-303), each worker loads 65+ modules independently (~5-15s).
# Railway won't route traffic until /health/live returns 200, preventing CRIT-010 404s.
# Combined with main.py lifespan gate (ready:false until startup complete).
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# SLA-001: 10 retries before giving up (was 3 — too aggressive for transient OOM)
restartPolicyMaxRetries = 10
# SLA-001: 45s overlap for zero-downtime deploys (SSE streams + long-running searches)
overlapSeconds = 45
# GTM-INFRA-002 AC4: 120s drain aligned with Railway hard timeout
# Prevents killing in-flight searches during deploys (was 30s)
drainingSeconds = 120

# =============================================================================
# Environment Variables (Set in Railway Dashboard)
# =============================================================================
# REQUIRED:
#   - OPENAI_API_KEY (Get from https://platform.openai.com/api-keys)
#   - PORT (Auto-injected by Railway)
#
# OPTIONAL (with defaults):
#   - LOG_LEVEL=INFO
#   - PNCP_TIMEOUT=30
#   - PNCP_MAX_RETRIES=5
#   - WEB_CONCURRENCY=2 (default: 2 spawn-based workers — safe with cryptography)
# =============================================================================
